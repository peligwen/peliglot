name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # ── Bundle Size Check ──────────────────────────────────────
      - name: Check bundle sizes
        run: |
          status=0
          max_kb=500
          echo "| File | Size |"
          echo "|------|------|"
          for f in dist/assets/*.js; do
            size=$(stat --format=%s "$f")
            size_kb=$((size / 1024))
            name=$(basename "$f")
            echo "| $name | ${size_kb}KB |"
            if [[ $size_kb -gt $max_kb ]]; then
              echo "::error file=$f::Bundle exceeds ${max_kb}KB limit (${size_kb}KB)"
              status=1
            fi
          done
          if [[ $status -ne 0 ]]; then
            exit 1
          fi
          echo "All bundles within size limits."

      # ── Guide Count Verification ───────────────────────────────
      - name: Verify guide counts
        run: |
          status=0
          for dir in src/guides/*/; do
            guide=$(basename "$dir")
            meta="$dir/meta.js"
            if [[ ! -f "$meta" ]]; then
              echo "::warning::No meta.js in $dir"
              continue
            fi
            count=$(grep -c '{ *id:' "$meta" || true)
            echo "$guide: $count guides in meta.js"
            if [[ $count -eq 0 ]]; then
              echo "::error file=$meta::No guide entries found in meta.js"
              status=1
            fi
          done
          if [[ $status -ne 0 ]]; then
            exit 1
          fi
          echo "All guide counts verified."

      - name: Verify build output
        run: |
          test -f dist/index.html || { echo "::error::dist/index.html missing"; exit 1; }
          echo "Build output verified."
