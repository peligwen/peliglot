const categories=["Sounds","Cases","Nouns","Pronouns","Verbs","Word Order","Practical"];
const catColors={Sounds:"#1a1a1a",Cases:"#C62828",Nouns:"#1565C0",Pronouns:"#C62828",Verbs:"#C62828","Word Order":"#1565C0",Practical:"#6A1B9A"};

// SHARED COMPONENTS
function Card({color,title,subtitle,children}){return(<div style={{background:"#fff",borderRadius:14,overflow:"hidden",border:"1px solid #e0dcd5",marginBottom:16}}><div style={{background:color,padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{color:"#fff",fontSize:15,fontWeight:800}}>{title}</span>{subtitle&&<span style={{color:"rgba(255,255,255,0.6)",fontSize:11}}>{subtitle}</span>}</div>{children}</div>);}
function DarkBox({title,children}){return(<div style={{background:"linear-gradient(135deg,#1a1a1a,#252525)",borderRadius:14,padding:"16px 20px",marginBottom:16,color:"#fff",textAlign:"center"}}>{title&&<div style={{fontSize:10,color:"#666",letterSpacing:2,textTransform:"uppercase",marginBottom:8,fontWeight:600}}>{title}</div>}{children}</div>);}
function Insight({text}){return(<div style={{background:"#FFF8E7",borderRadius:10,padding:"10px 14px",marginBottom:12,border:"1px solid #F0E4C4",fontSize:12,color:"#8B6914",lineHeight:1.5}}>{"💡 "}{text}</div>);}
function De({children}){return <span style={{fontStyle:"italic",color:"#C62828",fontWeight:600}}>{children}</span>;}
function SG({items}){return(<div>{items.map((item,i)=>(<div key={i} style={{background:"#fff",borderRadius:10,padding:"10px 14px",border:"1px solid #e0dcd5",marginBottom:6}}><div style={{fontSize:13,fontWeight:700,color:"#1a1a1a",marginBottom:4}}>{item.h}</div><div style={{fontSize:12,color:"#666",lineHeight:1.6,whiteSpace:"pre-line"}}>{item.b}</div></div>))}</div>);}

// ═══════════════════════════════════════════════════════════════
// GUIDES 1-4: SOUNDS
// ═══════════════════════════════════════════════════════════════
function Guide1(){
  const special=[{l:"Ä ä",name:"A-Umlaut",sound:"/ɛ/ — like 'e' in 'bed'",tip:"Pronounce 'a' but spread your lips like 'e'"},{l:"Ö ö",name:"O-Umlaut",sound:"/ø/ — no English equivalent",tip:"Make an 'o' shape with lips, try to say 'e' — the sound between them"},{l:"Ü ü",name:"U-Umlaut",sound:"/y/ — no English equivalent",tip:"Make an 'oo' shape with lips, try to say 'ee' — the sound between them"},{l:"ß",name:"Eszett",sound:"/s/ — sharp S",tip:"Always voiceless /s/. Used after long vowels and diphthongs: Straße, heißen. After short vowels: ss (Wasser, müssen)"}];
  const [sel,setSel]=useState(null);
  return(<div>
    <DarkBox title="26 + 4 special characters"><div style={{fontSize:14,lineHeight:1.6}}>German uses the same 26 letters as English, plus <strong style={{color:"#FFE77A"}}>three umlauts (ä, ö, ü)</strong> and the <strong style={{color:"#FFE77A"}}>Eszett (ß)</strong>. These aren't decorations — they're distinct sounds.</div></DarkBox>
    <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:8,marginBottom:16}}>
      {special.map((s,i)=>(<div key={i} onClick={()=>setSel(sel===i?null:i)} style={{background:"#fff",borderRadius:12,padding:"12px",border:sel===i?"2.5px solid #C62828":"1.5px solid #e0dcd5",cursor:"pointer",textAlign:"center",transition:"all 0.15s"}}>
        <div style={{fontSize:32,fontWeight:800,color:"#C62828"}}>{s.l}</div>
        <div style={{fontSize:12,fontWeight:600,color:"#555"}}>{s.name}</div>
        {sel===i&&<div style={{marginTop:8,textAlign:"left"}}><div style={{fontSize:12,color:"#1565C0",fontFamily:"monospace",marginBottom:4}}>{s.sound}</div><div style={{fontSize:11,color:"#888"}}>{s.tip}</div></div>}
      </div>))}
    </div>
    <Insight text="If you can't type umlauts, the accepted alternative is ae, oe, ue (Ärger = Aerger, über = ueber). For ß, use ss. But always use the real characters when possible." />
  </div>);
}

function Guide2(){return(<div>
  <DarkBox title="Vowel length changes meaning"><div style={{fontSize:14}}>German vowels are either <strong style={{color:"#FFE77A"}}>short (clipped)</strong> or <strong style={{color:"#FFE77A"}}>long (held)</strong>. The double-consonant rule: a vowel before a single consonant is usually long; before double consonants, short.</div></DarkBox>
  <SG items={[
    {h:"Long vs Short vowel pairs",b:"Staat /aː/ (state) vs Stadt /a/ (city)\nOfen /oː/ (oven) vs offen /ɔ/ (open)\nBeet /eː/ (flowerbed) vs Bett /ɛ/ (bed)\nRule: double consonant after = short vowel"},
    {h:"The three umlauts",b:"Ä /ɛ/: like 'e' in 'bed' — Mädchen, Käse\nÖ /ø/: lips of 'o' + tongue of 'e' — schön, hören\nÜ /y/: lips of 'oo' + tongue of 'ee' — über, Tür, grün\nÖ and Ü have NO English equivalent. Practice!"},
    {h:"Diphthongs",b:"ei/ai = /aɪ/ like 'eye': mein, Wein, Mai\nau = /aʊ/ like 'ow': Haus, Frau, Baum\neu/äu = /ɔɪ/ like 'oy': Freund, Häuser, neu"},
  ]} />
  <Insight text="The 'ei' vs 'ie' distinction trips everyone up. EI = 'eye' sound (mein, Wein). IE = 'ee' sound (Bier, Liebe). The SECOND letter tells you the sound." />
</div>);}

function Guide3(){
  const sounds=[
    {s:"ch (ich-Laut)",desc:"After e, i, ä, ö, ü, consonants: a soft hissing sound from the palate",ex:"ich, recht, möchte, Milch",approx:"Like a cat hissing, or the 'h' in 'huge'",color:"#C62828"},
    {s:"ch (ach-Laut)",desc:"After a, o, u, au: a rougher sound from the back of the throat",ex:"Bach, noch, Buch, auch",approx:"Like Scottish 'loch' or clearing your throat gently",color:"#1565C0"},
    {s:"R (uvular)",desc:"German R is produced in the throat/uvula, not with the tongue tip",ex:"rot, Frau, Brücke",approx:"A soft gargle — like French R. NOT the English R.",color:"#2E7D32"},
    {s:"Final devoicing",desc:"Voiced consonants become voiceless at the end of a word or syllable",ex:"Tag → /tak/, Hund → /hunt/, Rad → /rat/",approx:"The spelling stays but the sound changes. 'Tag' rhymes with 'tock'",color:"#E65100"},
    {s:"W = /v/, V = /f/",desc:"German W is English V. German V is usually English F.",ex:"Wasser = /vasser/, Vater = /fater/",approx:"Swap them in your head: W→V, V→F",color:"#6A1B9A"},
    {s:"Z = /ts/",desc:"Always /ts/, even at the start of words",ex:"Zeit, zehn, Zimmer, Zug",approx:"Like 'ts' in 'cats' — but at the start",color:"#880E4F"},
    {s:"sp/st at word start = /ʃp/, /ʃt/",desc:"S before p or t at the start of a word/root becomes 'sh'",ex:"sprechen = /ʃpreçən/, Straße = /ʃtraːsə/",approx:"'Shprechen' not 'sprechen'",color:"#00695C"},
  ];
  const [sel,setSel]=useState(null);
  return(<div>{sounds.map((s,i)=>(<div key={i} onClick={()=>setSel(sel===i?null:i)} style={{background:"#fff",borderRadius:10,padding:"10px 14px",border:sel===i?"2px solid "+s.color:"1px solid #e0dcd5",marginBottom:6,cursor:"pointer"}}>
    <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{background:s.color,color:"#fff",padding:"2px 10px",borderRadius:6,fontSize:12,fontWeight:800}}>{s.s}</span><span style={{fontSize:12,color:"#888"}}>{s.ex}</span></div>
    {sel===i&&<div style={{marginTop:8}}><div style={{fontSize:12,color:"#555",marginBottom:4}}>{s.desc}</div><div style={{background:s.color+"10",borderRadius:6,padding:"6px 10px",fontSize:12,color:s.color,fontWeight:600}}>{s.approx}</div></div>}
  </div>))}</div>);
}

function Guide4(){return(<SG items={[
  {h:"Default: stress on the first syllable",b:"ÁRbeiten, FRÜHstück, WÓHnung, FÉNster\nMost native German words stress syllable 1."},
  {h:"Separable prefixes: prefix gets stress",b:"ÁNrufen (to call), ÁUFstehen (to get up)\nMÍTkommen (to come along), ÉINkaufen (to shop)\nThe prefix carries the stress AND separates in main clauses."},
  {h:"Inseparable prefixes: root gets stress",b:"verSTÉHen (understand), erZÄ́Hlen (tell/narrate)\nbeSÚCHen (visit), entSCHÚLdigen (excuse)\nbe-, emp-, ent-, er-, ge-, miss-, ver-, zer- NEVER separate."},
  {h:"Foreign/borrowed words keep original stress",b:"StudÉNT, TeleFÓN, RestaURÁNT, UniverSITÄ́T\nOften stressed on the last or second-to-last syllable."},
]} />);}

// ═══════════════════════════════════════════════════════════════
// GUIDES 5-9: CASES
// ═══════════════════════════════════════════════════════════════
function Guide5(){return(<div>
  <DarkBox title="Why cases exist"><div style={{fontSize:14,lineHeight:1.6}}>Cases tell you <strong style={{color:"#FFE77A"}}>what role each noun plays</strong> in a sentence. English uses word order for this. German uses article changes — which means word order is much more flexible.</div></DarkBox>
  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
    {[{c:"Nominativ",role:"Subject (who/what does it)",ex:"Der Mann liest.",color:"#1565C0"},{c:"Akkusativ",role:"Direct object (whom/what)",ex:"Ich sehe den Mann.",color:"#C62828"},{c:"Dativ",role:"Indirect object (to/for whom)",ex:"Ich gebe dem Mann ein Buch.",color:"#E65100"},{c:"Genitiv",role:"Possession (whose)",ex:"Das Buch des Mannes.",color:"#2E7D32"}].map((x,i)=>(<div key={i} style={{background:"#fff",borderRadius:10,padding:"10px",border:"2px solid "+x.color+"30",textAlign:"center"}}>
      <div style={{fontSize:14,fontWeight:800,color:x.color}}>{x.c}</div>
      <div style={{fontSize:11,color:"#888",marginTop:2}}>{x.role}</div>
      <div style={{fontSize:12,fontStyle:"italic",color:"#555",marginTop:4}}>{x.ex}</div>
    </div>))}
  </div>
  <Insight text="English has case remnants too: I/me/my, he/him/his, who/whom/whose. German just applies this system to EVERY noun, through article changes." />
</div>);}

function Guide6(){
  const arts=[
    {g:"Masculine",nom:"der / ein",akk:"den / einen",note:"⚠ The ONLY change from Nom→Akk"},
    {g:"Feminine",nom:"die / eine",akk:"die / eine",note:"No change"},
    {g:"Neuter",nom:"das / ein",akk:"das / ein",note:"No change"},
    {g:"Plural",nom:"die / —",akk:"die / —",note:"No change"},
  ];
  return(<div>
    <Card color="#1565C0" title="Nominativ → Akkusativ" subtitle="Only masculine changes!">
      <div style={{display:"grid",gridTemplateColumns:"80px 1fr 1fr auto",padding:"6px 14px",fontSize:10,fontWeight:700,color:"#999",borderBottom:"1px solid #eee"}}><div></div><div>Nominativ</div><div>Akkusativ</div><div></div></div>
      {arts.map((a,i)=>(<div key={i} style={{display:"grid",gridTemplateColumns:"80px 1fr 1fr auto",padding:"8px 14px",borderBottom:i<3?"1px solid #f0eeeb":"none",alignItems:"center"}}>
        <span style={{fontSize:12,fontWeight:600,color:"#333"}}>{a.g}</span>
        <span style={{fontSize:13,color:"#555"}}>{a.nom}</span>
        <span style={{fontSize:13,fontWeight:700,color:i===0?"#C62828":"#555"}}>{a.akk}</span>
        <span style={{fontSize:10,color:i===0?"#C62828":"#aaa"}}>{a.note}</span>
      </div>))}
    </Card>
    <SG items={[
      {h:"Accusative prepositions (always accusative)",b:"für (for) · gegen (against) · ohne (without)\num (around/at) · durch (through) · bis (until)\nMnemonic: DOGFU — durch, ohne, gegen, für, um"},
      {h:"Examples",b:"Ich sehe den Mann. (I see the man — direct object)\nDas Buch ist für einen Freund. (The book is for a friend)\nEr geht ohne seinen Hund. (He goes without his dog)"},
    ]} />
    <Insight text="Good news: only masculine articles change from Nominativ to Akkusativ. der→den, ein→einen. Everything else stays the same. This is the easiest case transition." />
  </div>);
}

function Guide7(){
  const arts=[{g:"Masc",dat:"dem / einem"},{g:"Fem",dat:"der / einer"},{g:"Neut",dat:"dem / einem"},{g:"Plural",dat:"den + -n / —"}];
  return(<div>
    <Card color="#E65100" title="Dativ articles" subtitle="Everything changes here">
      {arts.map((a,i)=>(<div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 14px",borderBottom:i<3?"1px solid #f0eeeb":"none"}}><span style={{fontSize:13,fontWeight:600,color:"#333"}}>{a.g}</span><span style={{fontSize:14,fontWeight:700,color:"#E65100"}}>{a.dat}</span></div>))}
    </Card>
    <SG items={[
      {h:"Dative prepositions (always dative)",b:"aus (from/out of) · bei (at/near) · mit (with)\nnach (after/to) · seit (since) · von (from/of) · zu (to)\nMnemonic: 'Aus bei mit nach seit von zu — mit dem Dativ nur so zu!'"},
      {h:"Dative verbs (indirect object isn't optional!)",b:"helfen (help): Ich helfe dem Mann.\ndanken (thank): Ich danke dir.\ngefallen (to please): Das Buch gefällt mir.\ngehören (belong to): Das gehört dem Kind."},
      {h:"Dative plural -n rule",b:"ALL nouns add -n in dative plural (if they don't already end in -n or -s):\ndie Kinder → mit den Kindern\ndie Häuser → in den Häusern"},
    ]} />
  </div>);
}

function Guide8(){
  const preps=["an","auf","hinter","in","neben","über","unter","vor","zwischen"];
  const [mode,setMode]=useState("akk");
  return(<div>
    <DarkBox title="9 prepositions, 2 possible cases"><div style={{fontSize:14,lineHeight:1.6}}>
      <strong style={{color:"#FFE77A"}}>Motion/direction → Akkusativ (wohin?)</strong><br/>
      <strong style={{color:"#90CAF9"}}>Location/state → Dativ (wo?)</strong>
    </div></DarkBox>
    <div style={{display:"flex",gap:8,marginBottom:14,justifyContent:"center"}}>
      <button onClick={()=>setMode("akk")} style={{padding:"8px 18px",borderRadius:10,border:mode==="akk"?"2.5px solid #C62828":"1.5px solid #ddd",background:mode==="akk"?"#C62828":"#fff",color:mode==="akk"?"#fff":"#666",cursor:"pointer",fontWeight:700}}>Akkusativ (wohin?)</button>
      <button onClick={()=>setMode("dat")} style={{padding:"8px 18px",borderRadius:10,border:mode==="dat"?"2.5px solid #1565C0":"1.5px solid #ddd",background:mode==="dat"?"#1565C0":"#fff",color:mode==="dat"?"#fff":"#666",cursor:"pointer",fontWeight:700}}>Dativ (wo?)</button>
    </div>
    <div style={{display:"flex",flexWrap:"wrap",gap:6,justifyContent:"center",marginBottom:16}}>
      {preps.map(p=>(<span key={p} style={{padding:"6px 14px",borderRadius:16,background:mode==="akk"?"#FFEBEE":"#E3F2FD",color:mode==="akk"?"#C62828":"#1565C0",fontSize:14,fontWeight:700,border:"1px solid "+(mode==="akk"?"#FFCDD2":"#BBDEFB")}}>{p}</span>))}
    </div>
    <SG items={[
      {h:mode==="akk"?"Akkusativ = movement INTO/ONTO":"Dativ = already THERE",
       b:mode==="akk"?"Ich gehe in DEN Park. (I'm going into the park)\nEr legt das Buch auf DEN Tisch. (He puts the book onto the table)\nSie hängt das Bild an DIE Wand. (She hangs the picture on the wall)":"Ich bin in DEM Park. (I'm in the park)\nDas Buch liegt auf DEM Tisch. (The book is on the table)\nDas Bild hängt an DER Wand. (The picture hangs on the wall)"},
    ]} />
    <Insight text="Think of it this way: if there's a CHANGE of position (going somewhere), it's accusative. If the position is STATIC (being somewhere), it's dative." />
  </div>);
}

function Guide9(){return(<SG items={[
  {h:"Genitiv articles",b:"Masculine/Neuter: des + -(e)s on noun: des Mannes, des Kindes\nFeminine/Plural: der: der Frau, der Kinder\nein→eines, eine→einer"},
  {h:"Genitiv prepositions",b:"wegen (because of) · trotz (despite)\nwährend (during) · statt/anstatt (instead of)\nThese are formal — in speech, many Germans use dative instead."},
  {h:"The spoken reality",b:"Genitiv is fading in everyday speech.\n'Das Auto des Mannes' (formal) → 'dem Mann sein Auto' (colloquial)\n'Wegen des Wetters' (formal) → 'Wegen dem Wetter' (colloquial)\nKnow genitiv for reading and formal writing. Use dative in conversation."},
  {h:"The famous saying",b:"'Der Dativ ist dem Genitiv sein Tod' = 'The dative is the genitive's death'\nA humorous book title AND a grammatical demonstration of the trend."},
]} />);}

function Guide10(){
  const rules=[
    {g:"Masculine (der)",color:"#1565C0",patterns:["Male people/animals: der Mann, der Hund","Days/months/seasons: der Montag, der Januar, der Sommer","Car brands: der BMW, der Mercedes","-er agent nouns: der Lehrer, der Fahrer","-ling ending: der Frühling, der Schmetterling"]},
    {g:"Feminine (die)",color:"#C62828",patterns:["-ung ending (always!): die Wohnung, die Zeitung, die Übung","-heit/-keit: die Freiheit, die Möglichkeit","-schaft: die Freundschaft, die Wirtschaft","-tion: die Nation, die Information","-ie: die Energie, die Demokratie"]},
    {g:"Neuter (das)",color:"#2E7D32",patterns:["-chen/-lein diminutives (always!): das Mädchen, das Brötchen","Ge- collective nouns: das Gebäude, das Gebirge","Infinitives used as nouns: das Essen, das Leben","Most metals: das Gold, das Silber","Letters/colors: das A, das Rot"]},
  ];
  return(<div>

    <Insight text="'Gift' meaning 'poison' is probably the most dangerous false friend in any language. 'Ich habe ein Gift für dich' does NOT mean what you think!" />
  </div>);
}

// COMPONENT ARRAY & MAIN APP
const guideComponents=[Guide1,Guide2,Guide3,Guide4,Guide5,Guide6,Guide7,Guide8,Guide9,Guide10,Guide11,Guide12,Guide13,Guide14,Guide15,Guide16,Guide17,Guide18,Guide19,Guide20,Guide21,Guide22,Guide23,Guide24,Guide25,Guide26,Guide27,Guide28,Guide29,Guide30,Guide31,Guide32,Guide33];

const App = function(){
  const[page,setPage]=useState(0);const[menuOpen,setMenuOpen]=useState(false);const contentRef=useRef(null);
  const meta=guidesMeta[page];const GuideComp=guideComponents[page];const total=guidesMeta.length;
  const goTo=(i)=>{setPage(i);setMenuOpen(false);if(contentRef.current)contentRef.current.scrollTop=0;};
  const prev=()=>{if(page>0)goTo(page-1);};const next=()=>{if(page<total-1)goTo(page+1);};
  useEffect(()=>{const h=(e)=>{if(e.key==="ArrowLeft")prev();if(e.key==="ArrowRight")next();};window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);});
  return(
    <div style={{height:"100vh",display:"flex",flexDirection:"column",background:"#FAFAF6",fontFamily:"'Segoe UI','Helvetica Neue',sans-serif",overflow:"hidden",position:"relative"}}>
      <style>{"@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}*{box-sizing:border-box}::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#ddd;border-radius:4px}"}</style>
      <div style={{background:"#fff",borderBottom:"1px solid #eee",padding:"10px 16px",display:"flex",alignItems:"center",gap:12,flexShrink:0,zIndex:10}}>
        <button onClick={()=>setMenuOpen(!menuOpen)} style={{width:36,height:36,borderRadius:10,border:"1.5px solid #e0ddd5",background:"#fff",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,color:"#555",flexShrink:0}}>☰</button>
        <div style={{flex:1,minWidth:0}}><div style={{fontSize:14,fontWeight:800,color:"#1a1a1a",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{meta.icon} {meta.title}</div><div style={{fontSize:11,color:"#999"}}>{meta.subtitle}</div></div>
        <div style={{background:meta.color,color:"#fff",padding:"3px 10px",borderRadius:6,fontSize:10,fontWeight:700,flexShrink:0}}>{page+1}/{total}</div>
      </div>
      <div ref={contentRef} style={{flex:1,overflow:"auto",padding:"16px",position:"relative"}}><div key={page} style={{animation:"fadeIn 0.2s ease",maxWidth:700,margin:"0 auto"}}><GuideComp/></div></div>
      <div style={{background:"#fff",borderTop:"1px solid #eee",padding:"8px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <button onClick={prev} disabled={page===0} style={{padding:"8px 20px",borderRadius:10,border:"1.5px solid #e0ddd5",background:page===0?"#f5f5f5":"#fff",color:page===0?"#ccc":"#555",fontSize:13,fontWeight:700,cursor:page===0?"default":"pointer"}}>← Prev</button>
        <div style={{display:"flex",gap:2}}>{guidesMeta.map((_,i)=>(<div key={i} onClick={()=>goTo(i)} style={{width:i===page?12:3,height:3,borderRadius:2,background:i===page?meta.color:"#ddd",cursor:"pointer",transition:"all 0.2s"}}/>))}</div>
        <button onClick={next} disabled={page===total-1} style={{padding:"8px 20px",borderRadius:10,border:"1.5px solid #e0ddd5",background:page===total-1?"#f5f5f5":"#fff",color:page===total-1?"#ccc":"#555",fontSize:13,fontWeight:700,cursor:page===total-1?"default":"pointer"}}>Next →</button>
      </div>
      {menuOpen&&<div onClick={()=>setMenuOpen(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:20}}/>}
      <div style={{position:"fixed",top:0,left:0,bottom:0,width:280,background:"#fff",zIndex:30,transform:menuOpen?"translateX(0)":"translateX(-100%)",transition:"transform 0.25s ease",boxShadow:menuOpen?"4px 0 24px rgba(0,0,0,0.15)":"none",display:"flex",flexDirection:"column"}}>
        <div style={{padding:"16px 20px",borderBottom:"1px solid #eee",flexShrink:0}}><div style={{fontSize:18,fontWeight:800,color:"#1a1a1a"}}>Deutsch</div><div style={{fontSize:12,color:"#999"}}>33 Interactive Guides</div></div>
        <div style={{flex:1,overflow:"auto",padding:"8px 0"}}>
          {categories.map(cat=>{const items=guidesMeta.filter(g=>g.cat===cat);return(<div key={cat}><div style={{padding:"6px 20px",fontSize:10,fontWeight:700,color:catColors[cat],textTransform:"uppercase",letterSpacing:1.5,marginTop:4}}>{cat}</div>
            {items.map(g=>{const idx=g.id-1;const isActive=idx===page;return(<button key={g.id} onClick={()=>goTo(idx)} style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:"8px 20px",border:"none",background:isActive?g.color+"12":"transparent",cursor:"pointer",textAlign:"left",borderLeft:isActive?"3px solid "+g.color:"3px solid transparent"}}><span style={{fontSize:14,width:22,textAlign:"center"}}>{g.icon}</span><div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:isActive?800:600,color:isActive?g.color:"#333",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{g.subtitle}</div><div style={{fontSize:10,color:"#999",fontStyle:"italic"}}>{g.title}</div></div><span style={{fontSize:10,color:"#ccc",fontWeight:600}}>{g.id}</span></button>);})}
          </div>);})}
        </div>
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
