function DarkBox({title, children}) {

// FRETBOARD DIAGRAM
function Fretboard({frets=5,startFret=0,dots=[],labels={},highlightColor="#c4a87a",title}){
  const strings=6;const fretW=48;const strH=18;
  return(<div style={{marginBottom:16}}>
    {title&&<div style={{fontSize:12,fontWeight:700,color:"#888",marginBottom:6,textAlign:"center"}}>{title}</div>}
    <div style={{overflowX:"auto",display:"flex",justifyContent:"center"}}>
      <svg width={frets*fretW+30} height={strings*strH+20} style={{minWidth:frets*fretW+30}}>
        {/* Frets */}
        {Array.from({length:frets+1}).map((_,f)=>(<line key={f} x1={20+f*fretW} y1={10} x2={20+f*fretW} y2={10+(strings-1)*strH} stroke={f===0&&startFret===0?"#aaa":"#444"} strokeWidth={f===0&&startFret===0?3:1}/>))}
        {/* Strings */}
        {Array.from({length:strings}).map((_,s)=>(<line key={s} x1={20} y1={10+s*strH} x2={20+frets*fretW} y2={10+s*strH} stroke="#555" strokeWidth={1}/>))}
        {/* Fret numbers */}
        {Array.from({length:frets}).map((_,f)=>(<text key={f} x={20+f*fretW+fretW/2} y={10+(strings-1)*strH+16} textAnchor="middle" fontSize={9} fill="#555">{startFret+f+1}</text>))}
        {/* Dots */}
        {dots.map((d,i)=>{const isHL=d.hl!==false;return(
          <g key={i}>
            <circle cx={20+(d.fret-startFret-0.5)*fretW} cy={10+(d.string-1)*strH} r={7} fill={isHL?highlightColor:"#444"} stroke={isHL?highlightColor:"#555"} strokeWidth={1}/>
            {d.label&&<text x={20+(d.fret-startFret-0.5)*fretW} y={10+(d.string-1)*strH+3.5} textAnchor="middle" fontSize={8} fill={isHL?"#1a1a1a":"#aaa"} fontWeight={700}>{d.label}</text>}
          </g>
        );})}
        {/* Open/muted strings */}
        {[1,2,3,4,5,6].map(s=>{const dot=dots.find(d=>d.string===s&&d.fret===0);const mute=labels["x"+s];return dot?(<text key={s} x={8} y={10+(s-1)*strH+4} textAnchor="middle" fontSize={10} fill={highlightColor} fontWeight={700}>○</text>):mute?(<text key={s} x={8} y={10+(s-1)*strH+4} textAnchor="middle" fontSize={10} fill="#555">✕</text>):null;})}
      </svg>
    </div>
  </div>);
}

// AUDIO ENGINE
// ═══════════════════════════════════════════════════════════════
const synth = {current: null};
function getSynth() {
  if (!synth.current) {
    synth.current = new Tone.PolySynth(Tone.Synth, {
      oscillator: {type: "triangle"},
      envelope: {attack: 0.02, decay: 0.3, sustain: 0.2, release: 0.8},
      volume: -12
    }).toDestination();
  }
  return synth.current;
}
async function playNote(note, dur="8n") { await Tone.start(); getSynth().triggerAttackRelease(note, dur); }
async function playChord(notes, dur="2n") { await Tone.start(); getSynth().triggerAttackRelease(notes, dur); }
async function playSequence(notes, tempo=400) {
  await Tone.start(); const s = getSynth();
  for (let i = 0; i < notes.length; i++) {
    if (Array.isArray(notes[i])) s.triggerAttackRelease(notes[i], "4n");
    else s.triggerAttackRelease(notes[i], "8n");
    await new Promise(r => setTimeout(r, tempo));
  }
}
const playBtnStyle = {padding:"6px 12px",borderRadius:8,background:"#3a3025",color:"#c4a87a",border:"1px solid #4a4035",cursor:"pointer",fontSize:12,fontWeight:700};

// ═══════════════════════════════════════════════════════════════
// GUIDE 1: VOICE LEADING
// ═══════════════════════════════════════════════════════════════
function Guide1(){
  const [pair,setPair]=useState(0);
  const pairs=[
    {from:"Dm7",to:"G7",fromNotes:[{string:4,fret:5,label:"D"},{string:3,fret:5,label:"A"},{string:2,fret:5,label:"C"},{string:1,fret:5,label:"F"}],toNotes:[{string:4,fret:5,label:"D"},{string:3,fret:4,label:"G"},{string:2,fret:4,label:"B"},{string:1,fret:5,label:"F"}],motion:"Root stays, 5th drops to root, 7th drops to 3rd, 3rd stays as 7th",fromAudio:["D4","A4","C5","F5"],toAudio:["D4","G4","B4","F5"]},
    {from:"G7",to:"Cmaj7",fromNotes:[{string:4,fret:5,label:"D"},{string:3,fret:4,label:"G"},{string:2,fret:4,label:"B"},{string:1,fret:5,label:"F"}],toNotes:[{string:4,fret:5,label:"E"},{string:3,fret:5,label:"G"},{string:2,fret:5,label:"C"},{string:1,fret:4,label:"E"}],motion:"Each voice moves by a half step or stays. The 7th (F) resolves down to E.",fromAudio:["D4","G4","B4","F5"],toAudio:["E4","G4","C5","E5"]},
    {from:"Cmaj7",to:"Fmaj7",fromNotes:[{string:4,fret:5,label:"E"},{string:3,fret:5,label:"G"},{string:2,fret:5,label:"C"},{string:1,fret:4,label:"E"}],toNotes:[{string:4,fret:5,label:"E"},{string:3,fret:5,label:"A"},{string:2,fret:5,label:"C"},{string:1,fret:5,label:"F"}],motion:"E stays, G moves to A, C stays, E moves to F. Maximum common tones.",fromAudio:["E4","G4","C5","E5"],toAudio:["E4","A4","C5","F5"]},
  ];
  const p=pairs[pair];
  return(<div>
    <DarkBox title="Minimum motion, maximum harmony"><div style={{fontSize:14,lineHeight:1.6}}>
      Jazz guitar comping isn't about grabbing chord shapes — it's about <strong style={{color:"#c4a87a"}}>moving individual voices smoothly</strong> from one chord to the next. The 3rd and 7th are your <strong style={{color:"#c4a87a"}}>guide tones</strong> — they define the chord quality and create the melody of the harmony.
    </div></DarkBox>
    <div style={{display:"flex",gap:5,marginBottom:12,justifyContent:"center"}}>
      {pairs.map((pp,i)=>(<button key={i} onClick={()=>setPair(i)} style={{padding:"6px 14px",borderRadius:8,border:pair===i?"2px solid #c4a87a":"1.5px solid #444",background:pair===i?"#3a3025":"#1e1e1e",color:pair===i?"#c4a87a":"#888",cursor:"pointer",fontWeight:700,fontSize:13}}>{pp.from} → {pp.to}</button>))}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:8,alignItems:"center",marginBottom:12}}>
      <div style={{textAlign:"center"}}><div style={{fontSize:16,fontWeight:800,color:"#c4a87a"}}>{p.from}</div>
        <Fretboard frets={4} startFret={3} dots={p.fromNotes} highlightColor="#c4a87a"/>
      </div>
      <div style={{fontSize:24,color:"#555"}}>→</div>
      <div style={{textAlign:"center"}}><div style={{fontSize:16,fontWeight:800,color:"#81C784"}}>{p.to}</div>
        <Fretboard frets={4} startFret={3} dots={p.toNotes} highlightColor="#81C784"/>
      </div>
    </div>
    <div style={{background:"#1e1e1e",borderRadius:10,padding:"10px 14px",border:"1px solid #333",marginBottom:12,fontSize:12,color:"#aaa"}}>{p.motion}</div>
    <div style={{display:"flex",gap:6,justifyContent:"center",marginBottom:12}}>
      <button onClick={()=>playChord(p.fromAudio)} style={playBtnStyle}>▶ {p.from}</button>
      <button onClick={()=>playChord(p.toAudio)} style={playBtnStyle}>▶ {p.to}</button>
      <button onClick={()=>playSequence([p.fromAudio, p.toAudio], 600)} style={playBtnStyle}>▶ Play {p.from} → {p.to}</button>
    </div>
    <Insight text="The guide tone line (3rds and 7ths moving through a progression) IS a melody. Practice playing just the guide tones through a standard — that's the harmonic skeleton everything else hangs on." />
  </div>);
}

// ═══════════════════════════════════════════════════════════════
// GUIDE 2: DROP 2 & DROP 3
// ═══════════════════════════════════════════════════════════════
function Guide2(){
  const [type,setType]=useState("drop2");
  const [chordType,setChordType]=useState(0);
  const chords=[
    {name:"Cmaj7",drop2:[
      {inv:"Root",dots:[{string:5,fret:3,label:"C"},{string:4,fret:4,label:"G"},{string:3,fret:4,label:"B"},{string:2,fret:5,label:"E"}],sf:2,audio:["C3","G3","B3","E4"]},
      {inv:"1st",dots:[{string:5,fret:7,label:"E"},{string:4,fret:7,label:"B"},{string:3,fret:9,label:"E"},{string:2,fret:8,label:"G"}],sf:6,audio:["E3","B3","E4","G4"]},
    ],drop3:[
      {inv:"Root",dots:[{string:6,fret:8,label:"C"},{string:4,fret:9,label:"B"},{string:3,fret:9,label:"E"},{string:2,fret:8,label:"G"}],sf:7,audio:["C3","B3","E4","G4"]},
    ]},
    {name:"Dm7",drop2:[
      {inv:"Root",dots:[{string:5,fret:5,label:"D"},{string:4,fret:5,label:"A"},{string:3,fret:5,label:"C"},{string:2,fret:6,label:"F"}],sf:4,audio:["D3","A3","C4","F4"]},
    ],drop3:[
      {inv:"Root",dots:[{string:6,fret:10,label:"D"},{string:4,fret:10,label:"C"},{string:3,fret:10,label:"F"},{string:2,fret:10,label:"A"}],sf:9,audio:["D3","C4","F4","A4"]},
    ]},
    {name:"G7",drop2:[
      {inv:"Root",dots:[{string:5,fret:10,label:"G"},{string:4,fret:9,label:"D"},{string:3,fret:10,label:"F"},{string:2,fret:10,label:"B"}],sf:8,audio:["G3","D4","F4","B4"]},
    ],drop3:[
      {inv:"Root",dots:[{string:6,fret:3,label:"G"},{string:4,fret:3,label:"F"},{string:3,fret:4,label:"B"},{string:2,fret:3,label:"D"}],sf:2,audio:["G2","F3","B3","D4"]},
    ]},
  ];
  const ch=chords[chordType];
  const voicings=type==="drop2"?ch.drop2:ch.drop3;
  return(<div>
    <DarkBox title="The bread and butter of jazz guitar comping"><div style={{fontSize:14}}>
      <strong style={{color:"#c4a87a"}}>Drop 2</strong>: take the second-highest voice of a close voicing and drop it an octave. <strong style={{color:"#c4a87a"}}>Drop 3</strong>: drop the third-highest. These sit naturally on the guitar where close voicings don't.
    </div></DarkBox>
    <div style={{display:"flex",gap:5,marginBottom:8,justifyContent:"center"}}>
      {[{k:"drop2",l:"Drop 2"},{k:"drop3",l:"Drop 3"}].map(t=>(<button key={t.k} onClick={()=>setType(t.k)} style={{padding:"6px 16px",borderRadius:8,border:type===t.k?"2px solid #c4a87a":"1.5px solid #444",background:type===t.k?"#3a3025":"#1e1e1e",color:type===t.k?"#c4a87a":"#888",cursor:"pointer",fontWeight:700,fontSize:13}}>{t.l}</button>))}
    </div>
    <div style={{display:"flex",gap:5,marginBottom:12,justifyContent:"center"}}>
      {chords.map((c,i)=>(<button key={i} onClick={()=>setChordType(i)} style={{padding:"5px 14px",borderRadius:8,border:chordType===i?"2px solid #81C784":"1.5px solid #444",background:chordType===i?"#1B5E20":"#1e1e1e",color:chordType===i?"#81C784":"#888",cursor:"pointer",fontWeight:700}}>{c.name}</button>))}
    </div>
    {voicings.map((v,i)=>(<div key={i}><Fretboard frets={5} startFret={v.sf} dots={v.dots} highlightColor={type==="drop2"?"#c4a87a":"#81C784"} title={`${ch.name} ${type} — ${v.inv} inversion`}/>{v.audio&&<div style={{textAlign:"center",marginBottom:12}}><button onClick={()=>playChord(v.audio)} style={playBtnStyle}>▶ Play {ch.name} {v.inv}</button></div>}</div>))}
    <Insight text="Master Drop 2 voicings on the middle four strings (5-4-3-2 and 4-3-2-1) first. These cover 90% of comping situations. Drop 3 adds bass-register depth for solo guitar or duo settings." />
  </div>);
}

// ═══════════════════════════════════════════════════════════════
// GUIDE 3: SHELL VOICINGS
// ═══════════════════════════════════════════════════════════════
function Guide3(){
  const shells=[
    {name:"Cmaj7",root:6,dots:[{string:6,fret:8,label:"R"},{string:4,fret:9,label:"7"},{string:3,fret:9,label:"3"}],sf:7,note:"Root on 6th string. 5th omitted — bass has it.",audio:["C3","B3","E4"]},
    {name:"Dm7",root:5,dots:[{string:5,fret:5,label:"R"},{string:3,fret:5,label:"b7"},{string:2,fret:6,label:"b3"}],sf:4,note:"Root on 5th string. Three notes, full chord identity.",audio:["D3","C4","F4"]},
    {name:"G7",root:6,dots:[{string:6,fret:3,label:"R"},{string:4,fret:3,label:"b7"},{string:3,fret:4,label:"3"}],sf:2,note:"Dominant 7th shell. The b7 and 3 form a tritone — maximum tension.",audio:["G2","F3","B3"]},
    {name:"Cm7",root:6,dots:[{string:6,fret:8,label:"R"},{string:4,fret:8,label:"b7"},{string:3,fret:8,label:"b3"}],sf:7,note:"Minor shell. All three notes on the same fret — easy shape.",audio:["C3","Bb3","Eb4"]},
  ];
  return(<div>
    <DarkBox title="Root, 3rd, 7th — that's the whole chord"><div style={{fontSize:14}}>
      Shell voicings are the <strong style={{color:"#c4a87a"}}>minimum viable chord</strong>. The 5th is redundant (the bass covers it). The root grounds the harmony. The 3rd tells you major/minor. The 7th tells you the chord type. Three notes. Done.
    </div></DarkBox>
    {shells.map((s,i)=>(<div key={i} style={{background:"#1e1e1e",borderRadius:12,padding:"10px 14px",border:"1px solid #333",marginBottom:8}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
        <span style={{fontSize:16,fontWeight:800,color:"#c4a87a"}}>{s.name}</span>
        <span style={{fontSize:11,color:"#666"}}>root on string {s.root}</span>
      </div>
      <Fretboard frets={4} startFret={s.sf} dots={s.dots} highlightColor="#c4a87a"/>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}><div style={{fontSize:11,color:"#888",flex:1}}>{s.note}</div><button onClick={()=>playChord(s.audio)} style={playBtnStyle}>▶ Play</button></div>
    </div>))}
    <Insight text="In a band with bass, piano, and drums, playing big voicings muddies everything. Shell voicings let you comp clearly without stepping on anyone. Freddie Green took this further — sometimes just root + 3rd." />
    <Ref name="Listen" text="Freddie Green with Count Basie — the ultimate in shell voicing economy. Joe Pass solo guitar for the opposite: full voicings when you ARE the whole band." />
  </div>);
}

    {name:"Diminished substitution",rule:"Any dim7 = 3 other dim7 chords",ex:"Cdim7 = Ebdim7 = Gbdim7 = Adim7 (same notes, different spellings).",how:"Symmetrical chord — every note is equidistant. Move it up minor 3rds and you get the same chord.",color:"#EF9A9A"},

function Guide7(){return(<div>

  </div></DarkBox>
  <Card color="#C62828" title="The three bebop scales">

      {scale:"Major Bebop",formula:"1 2 3 4 5 #5 6 7",added:"Add #5 between 5 and 6",use:"Over major 7th chords. Less common but essential for landing chord tones.",color:"#81C784"},
      {scale:"Minor Bebop (Dorian)",formula:"1 2 b3 3 4 5 6 b7",added:"Add natural 3 between b3 and 4",use:"Over minor 7th chords. The passing tone creates a major flavor that resolves immediately.",color:"#90CAF9"},
    ].map((s,i)=>(<div key={i} style={{padding:"10px 14px",borderBottom:i<2?"1px solid #333":"none"}}>

  </Card>
  <Insight text="Start a descending dominant bebop scale from the root on a downbeat. The chord tones (R, b7, 5, 3) will ALL land on downbeats. This is the Charlie Parker principle — the scale is designed for rhythmic alignment." />

function Guide8(){return(<div>

  </div></DarkBox>
  <Card color="#D84315" title="Arpeggio superimposition">

function Guide9(){return(<div>
  <DarkBox title="Surrounding target notes before landing"><div style={{fontSize:14}}>
    An enclosure <strong style={{color:"#c4a87a"}}>surrounds a target note</strong> with notes above and below, then lands on it. These micro-ornaments are what make lines sound "jazzy" rather than scalar. Every great jazz solo is full of them.
  </div></DarkBox>
  <Card color="#BF360C" title="Enclosure types">
    {[{type:"Chromatic above + below",pattern:"Target: E → approach: F - Eb - E",desc:"Half step from above, half step from below, land. The most common enclosure."},
      {type:"Diatonic above + chromatic below",pattern:"Target: E → approach: F - D# - E",desc:"Scale tone above, chromatic below. Slightly smoother."},
      {type:"Double chromatic",pattern:"Target: E → approach: F# - F - Eb - E",desc:"Two notes above, one below. More elaborate — adds rhythmic interest."},
      {type:"Arpeggio into enclosure",pattern:"Over Cmaj7: G - B → F - Eb - E",desc:"Outline the chord, then enclose a target. Combines vertical and horizontal."},
    ].map((e,i)=>(<div key={i} style={{padding:"10px 14px",borderBottom:i<3?"1px solid #333":"none"}}>

  </Card>
  <Insight text="The enclosure into the 3rd of the next chord is arguably the most-used melodic device in all of jazz. Over Dm7 → G7 → Cmaj7, enclose the E (3rd of C) approaching the resolution. You'll hear it in every solo." />
</div>);}

function Guide10(){return(<div>
  <DarkBox title="The vocabulary inside ALL jazz"><div style={{fontSize:14}}>

  </div></DarkBox>
  <Card color="#1565C0" title="Blues elements in jazz context">
    {[{elem:"Minor pentatonic over dominant",desc:"C minor pentatonic over C7 — the b3 (Eb) against the natural 3 (E) creates the fundamental 'blues rub.' This tension is the soul of the sound.",color:"#EF9A9A"},

function Guide11(){return(<div>
  <DarkBox title="Using 'wrong' notes intentionally"><div style={{fontSize:14}}>

  </div></DarkBox>
  <Card color="#AD1457" title="Chromatic techniques">
    {[{tech:"Chromatic passing tones",desc:"Fill gaps between scale tones: C-C#-D-D#-E over Cmaj7. The chromatics resolve to chord tones, creating forward motion.",color:"#EF9A9A"},
      {tech:"Sideslipping",desc:"Take a pattern (e.g., Dm7 arpeggio), move it up a half step (Ebm7), then resolve back to Dm7. The momentary 'wrong' key creates delicious tension.",color:"#CE93D8"},
      {tech:"Chromatic enclosure of entire shapes",desc:"Approach a chord tone pattern from a half step above or below, then resolve. Like an enclosure but for whole phrases, not single notes.",color:"#90CAF9"},

      <span style={{fontSize:12,color:"#999"}}>{t.desc}</span>

  </Card>
  <Ref name="Listen" text="John Scofield — master of controlled outside playing. Pat Martino's 'El Hombre' for chromatic lines that always resolve. Ben Monder for extreme outside vocabulary." />
</div>);}

function Guide13(){return(<div>
  <DarkBox title="Narrative over noodling"><div style={{fontSize:14}}>
    A <strong style={{color:"#c4a87a"}}>motif</strong> is a short melodic idea. <strong style={{color:"#c4a87a"}}>Development</strong> means transforming it: repeat it at different pitches, change the rhythm, invert it, fragment it. This creates a coherent solo with a story arc instead of a string of unrelated licks.
  </div></DarkBox>
  <Card color="#4527A0" title="Development techniques">
    {[{tech:"Repetition with variation",desc:"Play the motif, then repeat it slightly changed — new pitch, added note, different ending. The brain loves almost-predictable patterns."},
      {tech:"Sequence (transposition)",desc:"Move the same shape to a different scale degree: play it from C, then from D, then from E. Creates forward motion through the harmony."},
      {tech:"Rhythmic displacement",desc:"Keep the pitches the same but start the motif on a different beat. A 4-note pattern starting on beat 1, then beat 2, then the 'and' of 3."},
      {tech:"Fragmentation",desc:"Take the first 2 notes of a 5-note motif and develop just those. Zoom into a piece of the idea."},
      {tech:"Inversion",desc:"Flip the motif upside down. If it went up a 3rd then down a 2nd, invert to down a 3rd then up a 2nd."},
    ].map((t,i)=>(<div key={i} style={{padding:"8px 14px",borderBottom:i<4?"1px solid #333":"none"}}>

      <span style={{fontSize:12,color:"#999"}}>{t.desc}</span>
    </div>))}
  </Card>
  <Ref name="Study" text="Sonny Rollins 'St. Thomas' solo — the textbook motivic development masterclass. Wes Montgomery's soloing builds ideas across chorus after chorus." />
</div>);}

function Guide14(){return(<div>

  </div></DarkBox>
  <Card color="#E65100" title="The swing spectrum">
    {[{feel:"Laid-back (behind the beat)",desc:"The second eighth note is late, almost lazy. Creates a heavy, relaxed groove. Dexter Gordon, Grant Green.",color:"#EF9A9A"},

    </div>))}

  <Insight text="Your swing feel is personal. There's no 'correct' ratio. The important thing is consistency — whatever your feel is, it should be intentional and steady. The ride cymbal is your metronome." />
</div>);}

function Guide15(){return(<div>

  <Card color="#EF6C00" title="Comping rhythm vocabulary">

  </Card>

function Guide17(){return(<div>
  <DarkBox title="Playing without a fixed tempo"><div style={{fontSize:14}}>
    Rubato is expressive time — <strong style={{color:"#c4a87a"}}>stretching and compressing</strong> the pulse intentionally. Ballad intros, unaccompanied passages, and duo settings all require this skill. It's not "out of time" — it's "in YOUR time."
  </div></DarkBox>
  <Card color="#FF8F00" title="Rubato skills">
    {[{skill:"Ballad intro",desc:"Solo guitar intro before the band enters. Establish the melody, suggest the harmony, set the emotional tone. Can be free or loosely in tempo. End on V7 to cue the band."},

function Guide18(){

      {approach:"Enclosure into 3rd of resolution",line:"Over G7: approach E (3rd of C) from F above and Eb below → land on E",desc:"THE most-used device. Target the 3rd of the I chord.",audio:null},
      {approach:"Scale-based with bebop note",line:"Dm7: D dorian → G7: G mixolydian bebop → Cmaj7: C major",desc:"Add the natural 7 (F#) to G mixolydian for downbeat alignment.",audio:null},
      {approach:"Arpeggio superimposition",line:"Dm7: Fmaj7 arp → G7: Bdim7 arp → Cmaj7: Em7 arp",desc:"Each arp outlines upper extensions of the underlying chord.",audio:[["F4","A4","C5","E5"],["B3","D4","F4","Ab4"],["E4","G4","B4","D5"]]},
      {approach:"Pentatonic approach",line:"Dm7: F major pent → G7: Ab minor pent → Cmaj7: D major pent",desc:"Pentatonics as color filters. The G7 pent creates altered tension.",audio:null},

function Guide19(){return(<div>

function Guide21(){return(<div>

function Guide23(){return(<div>

</div>);}

function Guide30(){return(<div>
  <DarkBox title="The hierarchy: time > harmony > melody > vocabulary"><div style={{fontSize:14}}>
    If your time is great, you sound professional even with simple ideas. If your time is bad, the most sophisticated vocabulary won't save you. <strong style={{color:"#c4a87a"}}>Prioritize accordingly.</strong>
  </div></DarkBox>
  <Card color="#757575" title="Practice structure">
    {[{block:"Warm-up (10 min)",desc:"Scales, arpeggios, or technique — but with a musical purpose. Don't mindlessly run patterns. Focus on tone, time, and relaxation."},
      {block:"Harmony (20 min)",desc:"Voicings through a tune, voice-leading exercises, comping with a play-along. Work on smoothness between chords."},
      {block:"Melody/Vocabulary (20 min)",desc:"Transcription work, practicing licks in all keys, applying new devices over changes. This is where you build your language."},
      {block:"Repertoire (20 min)",desc:"Play through tunes. Practice the form, the melody, the head arrangement. Simulate the bandstand — play the head, comp, solo, trade, take it out."},
      {block:"Free play (10 min)",desc:"No agenda. Just play. Follow your ears. This is where everything integrates and your personal voice emerges."},
    ].map((b,i)=>(<div key={i} style={{padding:"10px 14px",borderBottom:i<4?"1px solid #333":"none"}}>
      <span style={{fontWeight:700,color:"#B0BEC5"}}>{b.block}</span><br/>
      <span style={{fontSize:12,color:"#888"}}>{b.desc}</span>
    </div>))}
  </Card>
  <Insight text="The practice room develops your vocabulary. The bandstand develops your voice. You need both. Playing with real humans — even if they're better than you, ESPECIALLY if they're better — is where growth actually happens." />
  <Ref name="Final thought" text="'The problem with jazz guitar is that you spend years learning to play, and then you have to spend years learning to not play.' — Jim Hall" />
</div>);}

// ═══════════════════════════════════════════════════════════════
// COMPONENT ARRAY & MAIN APP
// ═══════════════════════════════════════════════════════════════
const guideComponents=[Guide1,Guide2,Guide3,Guide4,Guide5,Guide6,Guide7,Guide8,Guide9,Guide10,Guide11,Guide12,Guide13,Guide14,Guide15,Guide16,Guide17,Guide18,Guide19,Guide20,Guide21,Guide22,Guide23,Guide24,Guide25,Guide26,Guide27,Guide28,Guide29,Guide30];

const App = function JazzGuide(){
  const[page,setPage]=useState(0);
  const[menuOpen,setMenuOpen]=useState(false);
  const contentRef=useRef(null);
  const meta=guidesMeta[page];
  const GuideComp=guideComponents[page];
  const total=guidesMeta.length;

  const goTo=(i)=>{setPage(i);setMenuOpen(false);if(contentRef.current)contentRef.current.scrollTop=0;};
  const prev=()=>{if(page>0)goTo(page-1);};
  const next=()=>{if(page<total-1)goTo(page+1);};

  useEffect(()=>{
    const h=(e)=>{if(e.key==="ArrowLeft")prev();if(e.key==="ArrowRight")next();if(e.key==="Escape")setMenuOpen(false);};
    window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);
  });

  return(
    <div style={{height:"100vh",display:"flex",flexDirection:"column",background:"#121010",fontFamily:"'Segoe UI','Helvetica Neue',sans-serif",overflow:"hidden",position:"relative",color:"#ddd"}}>
      <a href="#main-content" className="skip-link">Skip to content</a>
      <style>{`@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}*{box-sizing:border-box}::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#3a3025;border-radius:4px}*:focus-visible{outline:2px solid #8D6E63;outline-offset:2px;border-radius:4px}.skip-link{position:absolute;top:-40px;left:0;background:#8D6E63;color:#fff;padding:8px 16px;z-index:100;font-size:14px;text-decoration:none;border-radius:0 0 8px 0}.skip-link:focus{top:0}@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}`}</style>

      <header role="banner" style={{background:"#1a1510",borderBottom:"1px solid #2a2218",padding:"10px 16px",display:"flex",alignItems:"center",gap:12,flexShrink:0,zIndex:10}}>
        <button onClick={()=>setMenuOpen(!menuOpen)} aria-label={menuOpen?"Close menu":"Open menu"} aria-expanded={menuOpen} aria-controls="sidebar-menu" style={{width:36,height:36,borderRadius:10,border:"1.5px solid #3a3025",background:"#1e1e1e",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,color:"#888",flexShrink:0}}>☰</button>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:14,fontWeight:800,color:"#e8dcc8",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{meta.icon} {meta.title}</div>
          <div style={{fontSize:11,color:"#7a6e5e"}}>{meta.subtitle}</div>
        </div>
        <div aria-label={"Guide "+(page+1)+" of 30"} style={{background:meta.color,color:"#fff",padding:"3px 10px",borderRadius:6,fontSize:10,fontWeight:700,flexShrink:0}}>{page+1}/{total}</div>
      </header>

      <main id="main-content" role="main" ref={contentRef} style={{flex:1,overflow:"auto",padding:"16px",position:"relative"}}>
        <div key={page} style={{animation:"fadeIn 0.2s ease",maxWidth:700,margin:"0 auto"}}><GuideComp/></div>
      </main>

      <nav role="navigation" aria-label="Guide navigation" style={{background:"#1a1510",borderTop:"1px solid #2a2218",padding:"8px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <button onClick={prev} aria-label="Previous guide" disabled={page===0} style={{padding:"8px 20px",borderRadius:10,border:"1.5px solid #3a3025",background:page===0?"#151010":"#1e1e1e",color:page===0?"#444":"#aaa",fontSize:13,fontWeight:700,cursor:page===0?"default":"pointer"}}>← Prev</button>
        <div role="tablist" aria-label="Guide pages" style={{display:"flex",gap:2}}>{guidesMeta.map((_,i)=>(<div key={i} role="tab" aria-selected={i===page} aria-label={"Guide "+(i+1)+": "+guidesMeta[i].title} tabIndex={i===page?0:-1} onClick={()=>goTo(i)} onKeyDown={e=>{if(e.key==="Enter"||e.key===" ")goTo(i);}} style={{width:i===page?12:3,height:3,borderRadius:2,background:i===page?"#c4a87a":"#3a3025",cursor:"pointer",transition:"all 0.2s"}}/>))}</div>
        <button onClick={next} aria-label="Next guide" disabled={page===29} style={{padding:"8px 20px",borderRadius:10,border:"1.5px solid #3a3025",background:page===total-1?"#151010":"#1e1e1e",color:page===total-1?"#444":"#aaa",fontSize:13,fontWeight:700,cursor:page===total-1?"default":"pointer"}}>Next →</button>
      </nav>

      {menuOpen&&<div aria-hidden="true" onClick={()=>setMenuOpen(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:20}}/>}
      <aside id="sidebar-menu" role="navigation" aria-label="Guide list" onKeyDown={e=>{if(e.key==="Escape")setMenuOpen(false);}} style={{position:"fixed",top:0,left:0,bottom:0,width:280,background:"#1a1510",zIndex:30,transform:menuOpen?"translateX(0)":"translateX(-100%)",transition:"transform 0.25s ease",boxShadow:menuOpen?"4px 0 24px rgba(0,0,0,0.4)":"none",display:"flex",flexDirection:"column"}}>
        <div style={{padding:"16px 20px",borderBottom:"1px solid #2a2218",flexShrink:0}}>
          <div style={{fontSize:18,fontWeight:800,color:"#e8dcc8"}}>Jazz Guitar</div>
          <div style={{fontSize:12,color:"#7a6e5e"}}>30 Guides for Working Musicians</div>
        </div>
        <div style={{flex:1,overflow:"auto",padding:"8px 0"}}>
          {categories.map(cat=>{
            const items=guidesMeta.filter(g=>g.cat===cat);
            return(<div key={cat}>
              <div role="heading" aria-level="2" style={{padding:"6px 20px",fontSize:10,fontWeight:700,color:catColors[cat]==="@1a1a1a"?"#888":catColors[cat],textTransform:"uppercase",letterSpacing:1.5,marginTop:4,color:"#7a6e5e"}}>{cat}</div>
              {items.map(g=>{const idx=g.id-1;const isActive=idx===page;return(
                <button key={g.id} onClick={()=>goTo(idx)} aria-current={isActive?"page":undefined} style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:"8px 20px",border:"none",background:isActive?"#2a2218":"transparent",cursor:"pointer",textAlign:"left",borderLeft:isActive?"3px solid #c4a87a":"3px solid transparent",color:"#ccc"}}>
                  <span style={{fontSize:14,width:22,textAlign:"center"}}>{g.icon}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:isActive?800:600,color:isActive?"#e8dcc8":"#999",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{g.title}</div>
                    <div style={{fontSize:10,color:"#5a5040"}}>{g.subtitle}</div>
                  </div>
                  <span style={{fontSize:10,color:"#3a3025",fontWeight:600}}>{g.id}</span>
                </button>
              );})}
            </div>);
          })}
        </div>
      </aside>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
