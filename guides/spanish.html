const letters = [
  { letter: "A", name: "a", ipa: "/a/", approx: "Like 'ah' in 'father'", tricky: false, tip: "Open, clear vowel. Never changes." },
  { letter: "B", name: "be", ipa: "/b/, /β/", approx: "Like 'b' at start; softer between vowels", tricky: true, tip: "Between vowels, lips don't fully close." },
  { letter: "C", name: "ce", ipa: "/k/, /s/", approx: "'k' before a/o/u; 's' before e/i", tricky: true, tip: "In Latin America, c before e/i = 's'. In Spain, it's 'th'." },
  { letter: "D", name: "de", ipa: "/d/, /ð/", approx: "Hard 'd' at start; soft 'th' between vowels", tricky: true, tip: "Between vowels, sounds like 'th' in 'the'." },
  { letter: "E", name: "e", ipa: "/e/", approx: "Like 'eh' in 'bet'", tricky: false, tip: "Always short and crisp." },
  { letter: "F", name: "efe", ipa: "/f/", approx: "Same as English 'f'", tricky: false, tip: "Identical to English." },
  { letter: "G", name: "ge", ipa: "/ɡ/, /x/", approx: "Hard 'g' before a/o/u; throaty 'h' before e/i", tricky: true, tip: "Before e/i, strong 'h' from throat." },
  { letter: "H", name: "hache", ipa: "silent", approx: "Always silent", tricky: true, tip: "Never pronounced. 'Hola' = 'ola'." },
  { letter: "I", name: "i", ipa: "/i/", approx: "Like 'ee' in 'see'", tricky: false, tip: "Always 'ee'. Short and pure." },
  { letter: "J", name: "jota", ipa: "/x/", approx: "Strong throaty 'h'", tricky: true, tip: "Stronger than English 'h'. México: softer." },
  { letter: "K", name: "ka", ipa: "/k/", approx: "Like English 'k'", tricky: false, tip: "Only in borrowed words." },
  { letter: "L", name: "ele", ipa: "/l/", approx: "Like English 'l'", tricky: false, tip: "Lighter than English 'dark l'." },
  { letter: "LL", name: "elle", ipa: "/ʝ/", approx: "Like 'y' in 'yes'", tricky: true, tip: "In Mexico: 'y' sound. Argentina: 'sh'." },
  { letter: "M", name: "eme", ipa: "/m/", approx: "Same as English", tricky: false, tip: "Identical to English." },
  { letter: "N", name: "ene", ipa: "/n/", approx: "Same as English", tricky: false, tip: "Identical to English." },
  { letter: "Ñ", name: "eñe", ipa: "/ɲ/", approx: "Like 'ny' in 'canyon'", tricky: true, tip: "Unique to Spanish!" },
  { letter: "O", name: "o", ipa: "/o/", approx: "Like 'oh' but shorter", tricky: false, tip: "Pure, round, short." },
  { letter: "P", name: "pe", ipa: "/p/", approx: "Like 'p' but no puff of air", tricky: false, tip: "Unaspirated." },
  { letter: "Q", name: "cu", ipa: "/k/", approx: "Always 'k'; u is silent in qu", tricky: false, tip: "que = 'keh', qui = 'kee'." },
  { letter: "R", name: "ere", ipa: "/ɾ/", approx: "Single tap, like 'tt' in 'butter'", tricky: true, tip: "Quick tongue tap." },
  { letter: "RR", name: "erre", ipa: "/r/", approx: "Rolled/trilled 'r'", tricky: true, tip: "Multiple rapid tongue taps." },
  { letter: "S", name: "ese", ipa: "/s/", approx: "Like English 's'", tricky: false, tip: "Always clean 's'. Never buzzes." },
  { letter: "T", name: "te", ipa: "/t/", approx: "Like 't' but dental", tricky: false, tip: "Tongue touches teeth." },
  { letter: "U", name: "u", ipa: "/u/", approx: "Like 'oo' in 'moon'", tricky: false, tip: "Always 'oo'. Silent after q." },
  { letter: "V", name: "ve", ipa: "/b/, /β/", approx: "Identical to B", tricky: true, tip: "No B/V difference!" },
  { letter: "W", name: "doble ve", ipa: "/w/", approx: "Like English 'w'", tricky: false, tip: "Only in borrowed words." },
  { letter: "X", name: "equis", ipa: "/ks/, /x/, /s/", approx: "Usually 'ks'; sometimes 'h'", tricky: true, tip: "In 'México' = 'h' (Nahuatl)." },
  { letter: "Y", name: "ye", ipa: "/ʝ/, /i/", approx: "Like 'y'; alone = 'ee'", tricky: false, tip: "The word 'y' = 'ee'." },
  { letter: "Z", name: "zeta", ipa: "/s/", approx: "Like 's' in Latin America", tricky: true, tip: "In Mexico: always 's'. Spain: 'th'." },
];

function speakSpanish(text, onEnd) {
  if (!window.speechSynthesis) { if (onEnd) onEnd(); return; }
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = "es";
  utter.rate = 0.85;
  if (onEnd) utter.onend = onEnd;
  utter.onerror = () => { if (onEnd) onEnd(); };
  window.speechSynthesis.speak(utter);
}

          </button>);

      </div>

        <div style={{background:"#2C5F2D",padding:"16px 20px",display:"flex",alignItems:"center",gap:16}}>
          <div style={{fontSize:40,fontWeight:700,color:"#FFE77A",minWidth:50,textAlign:"center"}}>{sel.letter}</div>
          <div><div onClick={(e)=>{e.stopPropagation();if(speaking)return;setSpeaking(true);speakSpanish(sel.name,()=>setSpeaking(false))}} style={{color:"rgba(255,255,255,0.6)",fontSize:11,cursor:window.speechSynthesis?"pointer":"default",display:"inline-flex",alignItems:"center",gap:4,opacity:speaking?0.6:1,transition:"opacity 0.15s"}}>Name: <strong style={{color:"#fff"}}>{sel.name}</strong>{window.speechSynthesis&&<span style={{fontSize:12,opacity:speaking?1:0.6,animation:speaking?"pulse 0.8s ease infinite":"none"}}>{speaking?"\uD83D\uDD0A":"\uD83D\uDD08"}</span>}</div><div style={{color:"#FFE77A",fontSize:16,fontFamily:"monospace",fontWeight:700}}>{sel.ipa}</div></div>
        </div>
        <div style={{padding:"14px 18px"}}>
          <div style={{background:"#FFF8E7",borderRadius:8,padding:"10px 14px",marginBottom:10,border:"1px solid #F0E4C4"}}>
            <div style={{fontSize:10,color:"#998544",fontWeight:600,marginBottom:3,textTransform:"uppercase",letterSpacing:1}}>Sounds Like</div>

function VowelBar(){
  const vs=[{l:"A",s:"ah",w:"father"},{l:"E",s:"eh",w:"bet"},{l:"I",s:"ee",w:"see"},{l:"O",s:"oh",w:"go"},{l:"U",s:"oo",w:"moon"}];
  return(<div style={{background:"#fff",borderRadius:12,overflow:"hidden",border:"1px solid #e8e5e0"}}>
    <div style={{padding:"8px 14px",background:"#FFF8E7",borderBottom:"1px solid #F0E4C4",fontSize:13,fontWeight:700,color:"#8B6914"}}>5 Vowels — Your Anchor</div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)"}}>
      {vs.map((v,i)=>(<div key={v.l} onClick={()=>window.speechSynthesis&&speakSpanish(v.l.toLowerCase())} style={{padding:"12px 6px",textAlign:"center",borderRight:i<4?"1px solid #f0eeeb":"none",cursor:window.speechSynthesis?"pointer":"default",transition:"background 0.15s"}} onMouseEnter={e=>{if(window.speechSynthesis)e.currentTarget.style.background="#FFF8E7"}} onMouseLeave={e=>{e.currentTarget.style.background="transparent"}}>

        <div style={{fontSize:14,color:"#D4A843",fontWeight:700,fontFamily:"monospace"}}>{v.s}{window.speechSynthesis&&<span style={{marginLeft:4,fontSize:10,opacity:0.5}}>{"\uD83D\uDD08"}</span>}</div>
        <div style={{fontSize:10,color:"#999"}}>"{v.w}"</div>

  {id:"esdrujulas",name:"Esdrújulas",rule:"Stress on 3RD-TO-LAST",when:"ALWAYS have accent mark",color:"#2A9D8F",

}

  const tenerUses=["Person / animal feels warm","Subjective sensation of heat","Living beings only","Uses tener + calor (calor is a noun)","Tengo calor → I feel hot","Ella tiene calor → She feels hot"];
  const estarUses=["Object / thing has high temperature","Physical state of being hot","Things, places, food, drinks","La sopa está caliente → The soup is hot","El motor está caliente → The engine is hot","⚠️ Colloquial: sexually aroused — avoid for temperature!"];
  const examples=[{phrase:"Tengo calor.",eng:"I feel hot."},{phrase:"El café está caliente.",eng:"The coffee is hot."},{phrase:"Ella tiene mucho calor.",eng:"She is very hot (feeling)."},{phrase:"El agua está caliente.",eng:"The water is hot."},{phrase:"Tenemos calor en verano.",eng:"We feel hot in summer."},{phrase:"La estufa está caliente.",eng:"The stove is hot."}];
  return(<div>
    <div style={{display:"flex",gap:8,marginBottom:16,justifyContent:"center"}}>
      {[{k:"tener",l:"TENER CALOR",c:"#E65100"},{k:"estar",l:"ESTAR CALIENTE",c:"#B71C1C"}].map(s=>(<button key={s.k} onClick={()=>setSec(s.k)} style={{flex:1,maxWidth:200,padding:"12px",borderRadius:10,border:sec===s.k?`2.5px solid ${s.c}`:"1.5px solid #ddd",background:sec===s.k?s.c:"#fff",color:sec===s.k?"#fff":"#666",cursor:"pointer",fontSize:15,fontWeight:800}}>{s.l}</button>))}
    </div>
    <Card color={sec==="tener"?"#E65100":"#B71C1C"} title={sec==="tener"?"TENER CALOR — Feeling hot (people)":"ESTAR CALIENTE — Being hot (objects)"}>
      {(sec==="tener"?tenerUses:estarUses).map((u,i,a)=>(<div key={i} style={{padding:"8px 16px",borderBottom:i<a.length-1?"1px solid #f0eeeb":"none",fontSize:13,color:"#555"}}>• {u}</div>))}
    </Card>
    <div style={{background:"#FFEBEE",borderRadius:10,padding:"10px 14px",marginBottom:12,border:"1px solid #FFCDD2",fontSize:12,color:"#B71C1C",lineHeight:1.5}}>🚨 Never say <strong>"Estoy caliente"</strong> to mean you feel hot — in most of Latin America this means sexually aroused. Always say <strong>"Tengo calor"</strong> for personal warmth.</div>
    <div style={{background:"#fff",borderRadius:12,overflow:"hidden",border:"1px solid #eee",marginTop:8}}>
      <div style={{padding:"10px 16px",background:"#FFF8E7",fontSize:13,fontWeight:700,color:"#8B6914"}}>📝 Examples</div>
      {examples.map((ex,i)=>(<div key={i} style={{display:"grid",gridTemplateColumns:"1fr 1fr",padding:"8px 16px",borderBottom:i<examples.length-1?"1px solid #f0eeeb":"none",fontSize:12}}>
        <span style={{fontWeight:700,color:"#333"}}>{ex.phrase}</span>
        <span style={{color:"#777"}}>{ex.eng}</span>
      </div>))}
    </div>
    <Insight text="For weather, use 'Hace calor' (It's hot out) — neither estar caliente nor tener calor works for weather." />
  </div>);
}

// GUIDE 27: EL TIEMPO (WEATHER)
// ═══════════════════════════════════════════════════════════════
function Guide27(){
  const weatherExpr=[
    {expr:"Hace calor",    eng:"It's hot",           type:"hace", icon:"🌡️", ex:"Hoy hace mucho calor.",               exE:"Today it's very hot."},
    {expr:"Hace frío",     eng:"It's cold",          type:"hace", icon:"🥶", ex:"En enero hace mucho frío.",            exE:"In January it's very cold."},
    {expr:"Hace viento",   eng:"It's windy",         type:"hace", icon:"💨", ex:"Hace mucho viento hoy.",              exE:"It's very windy today."},
    {expr:"Hace sol",      eng:"It's sunny",         type:"hace", icon:"☀️", ex:"Hace sol en verano.",                 exE:"It's sunny in summer."},
    {expr:"Hace buen tiempo", eng:"The weather is nice", type:"hace", icon:"😊", ex:"Hoy hace buen tiempo.",          exE:"The weather is nice today."},
    {expr:"Hace mal tiempo",  eng:"The weather is bad",  type:"hace", icon:"🌩️", ex:"Hace mal tiempo esta semana.",   exE:"The weather is bad this week."},
    {expr:"Está lloviendo",   eng:"It's raining",    type:"esta", icon:"🌧️", ex:"Está lloviendo mucho.",             exE:"It's raining a lot."},
    {expr:"Está nevando",     eng:"It's snowing",    type:"esta", icon:"❄️", ex:"Está nevando en las montañas.",      exE:"It's snowing in the mountains."},
    {expr:"Está nublado",     eng:"It's cloudy",     type:"esta", icon:"☁️", ex:"Está muy nublado hoy.",             exE:"It's very cloudy today."},
    {expr:"Está despejado",   eng:"It's clear",      type:"esta", icon:"🌤️", ex:"Está despejado esta mañana.",       exE:"It's clear this morning."},
    {expr:"Hay niebla",       eng:"There's fog",     type:"hay",  icon:"🌫️", ex:"Hay mucha niebla en la costa.",     exE:"There's a lot of fog on the coast."},
    {expr:"Hay tormenta",     eng:"There's a storm", type:"hay",  icon:"⛈️", ex:"Hay una tormenta esta noche.",      exE:"There's a storm tonight."},
    {expr:"Hay granizo",      eng:"There's hail",    type:"hay",  icon:"🌨️", ex:"Hay granizo en el norte.",          exE:"There's hail in the north."},
    {expr:"Hay lluvia",       eng:"There's rain",    type:"hay",  icon:"🌂", ex:"Hay lluvia toda la semana.",         exE:"There's rain all week."},
  ];
  const seasons=[
    {name:"La Primavera",eng:"Spring",icon:"🌸",color:"#C2185B",months:"marzo – mayo",   desc:"templado / mild"},
    {name:"El Verano",  eng:"Summer",icon:"☀️",color:"#E65100",months:"junio – agosto",  desc:"caluroso / hot"},
    {name:"El Otoño",   eng:"Autumn",icon:"🍂",color:"#BF360C",months:"sept. – nov.",    desc:"fresco / cool"},
    {name:"El Invierno",eng:"Winter",icon:"❄️",color:"#0D47A1",months:"dic. – febrero",  desc:"frío / cold"},
  ];
  const typeColors={hace:"#D84315",esta:"#1565C0",hay:"#2E7D32"};
  const typeLabels={hace:"HACE",esta:"ESTÁ",hay:"HAY"};

  const [view,setView]=useState("expr");
  const [filter,setFilter]=useState("all");
  const [expanded,setExpanded]=useState(null);

  const shuffle=(arr)=>{const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;};
  const makeQuestions=()=>shuffle(weatherExpr).map((q,_,arr)=>{const wrong=shuffle(arr.filter(x=>x.expr!==q.expr)).slice(0,3);return{...q,options:shuffle([q.expr,...wrong.map(x=>x.expr)])}; });

  const [questions,setQuestions]=useState(()=>makeQuestions());
  const [qIdx,setQIdx]=useState(0);
  const [chosen,setChosen]=useState(null);
  const [score,setScore]=useState(0);
  const [done,setDone]=useState(false);

  const resetQuiz=()=>{setQuestions(makeQuestions());setQIdx(0);setChosen(null);setScore(0);setDone(false);};
  const handleAnswer=(opt)=>{if(chosen)return;setChosen(opt);if(opt===questions[qIdx].expr)setScore(s=>s+1);};
  const handleNext=()=>{if(qIdx+1>=questions.length){setDone(true);}else{setQIdx(i=>i+1);setChosen(null);}};

  const filtered=filter==="all"?weatherExpr:weatherExpr.filter(w=>w.type===filter);
  const q=!done?questions[qIdx]:null;

  return(<div>
    {/* ── VIEW TOGGLE ── */}
    <div style={{display:"flex",gap:8,marginBottom:16,justifyContent:"center"}}>
      {[{k:"expr",l:"📚 EXPRESSIONS"},{k:"quiz",l:"🎯 QUIZ"}].map(v=>(
        <button key={v.k} onClick={()=>setView(v.k)} style={{flex:1,maxWidth:180,padding:"11px",borderRadius:10,border:view===v.k?"2.5px solid #0277BD":"1.5px solid #ddd",background:view===v.k?"#0277BD":"#fff",color:view===v.k?"#fff":"#666",cursor:"pointer",fontSize:13,fontWeight:800}}>{v.l}</button>
      ))}
    </div>

    {/* ── EXPRESSIONS VIEW ── */}
    {view==="expr"&&(<div>
      {/* Filter chips */}
      <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
        {[{k:"all",l:"ALL",c:"#0277BD"},...Object.keys(typeColors).map(k=>({k,l:typeLabels[k],c:typeColors[k]}))].map(f=>(
          <button key={f.k} onClick={()=>{setFilter(f.k);setExpanded(null);}} style={{padding:"6px 16px",borderRadius:20,border:filter===f.k?`2px solid ${f.c}`:"1.5px solid #ddd",background:filter===f.k?f.c:"#fff",color:filter===f.k?"#fff":"#666",fontSize:12,fontWeight:700,cursor:"pointer"}}>{f.l}</button>
        ))}
      </div>

      {/* Weather card grid */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
        {filtered.map((w)=>{
          const c=typeColors[w.type];
          const isOpen=expanded===w.expr;
          return(
            <div key={w.expr} onClick={()=>setExpanded(isOpen?null:w.expr)} style={{background:"#fff",borderRadius:12,border:isOpen?`2px solid ${c}`:"1.5px solid #eee",cursor:"pointer",overflow:"hidden",transition:"border 0.15s"}}>
              <div style={{padding:"12px 10px",textAlign:"center"}}>
                <div style={{fontSize:28,marginBottom:4}}>{w.icon}</div>
                <div style={{fontSize:12,fontWeight:800,color:"#1a1a1a",marginBottom:2}}>{w.expr}</div>
                <div style={{fontSize:11,color:"#999"}}>{w.eng}</div>
              </div>
              {isOpen&&(<div style={{borderTop:`1px solid ${c}33`,padding:"8px 10px",background:`${c}09`}}>
                <span style={{display:"inline-block",fontSize:9,fontWeight:700,color:"#fff",background:c,borderRadius:4,padding:"2px 6px",marginBottom:6}}>{typeLabels[w.type]}</span>
                <div style={{fontSize:12,fontWeight:700,color:"#333",marginBottom:2}}>{w.ex}</div>
                <div style={{fontSize:11,color:"#777",fontStyle:"italic"}}>{w.exE}</div>
              </div>)}
            </div>
          );
        })}
      </div>

      <Insight text="Three patterns — HACE + noun (calor/frío/viento/sol), ESTÁ + adjective/gerund (nublado/lloviendo), HAY + noun (niebla/tormenta). Each has its own grammar!" />

      {/* Las Estaciones */}
      <div style={{background:"#fff",borderRadius:14,overflow:"hidden",border:"1px solid #eee",marginBottom:16}}>
        <div style={{background:"#0277BD",padding:"12px 16px",display:"flex",alignItems:"center",gap:8}}>
          <span style={{color:"#fff",fontSize:15,fontWeight:800}}>🗓️ LAS ESTACIONES</span>
          <span style={{color:"rgba(255,255,255,0.6)",fontSize:11}}>The Seasons</span>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr"}}>
          {seasons.map((s,i)=>(
            <div key={s.name} style={{padding:"14px",borderRight:i%2===0?"1px solid #f0eeeb":"none",borderBottom:i<2?"1px solid #f0eeeb":"none"}}>
              <div style={{fontSize:24,marginBottom:6}}>{s.icon}</div>
              <div style={{fontSize:13,fontWeight:800,color:s.color}}>{s.name}</div>
              <div style={{fontSize:11,color:"#aaa",marginBottom:2}}>{s.eng}</div>
              <div style={{fontSize:10,color:"#ccc",marginBottom:4}}>{s.months}</div>
              <div style={{display:"inline-block",fontSize:10,fontWeight:700,color:s.color,background:`${s.color}14`,borderRadius:4,padding:"2px 7px"}}>{s.desc}</div>
            </div>
          ))}
        </div>
      </div>
    </div>)}

    {/* ── QUIZ VIEW ── */}
    {view==="quiz"&&(<div>
      {!done?(
        <div>
          {/* Score bar */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,padding:"8px 14px",background:"#fff",borderRadius:10,border:"1px solid #eee",fontSize:12}}>
            <span style={{color:"#555",fontWeight:600}}>Question {qIdx+1} / {questions.length}</span>
            <span style={{color:"#2E7D32",fontWeight:800}}>✓ {score} correct</span>
          </div>

          {/* Question card */}
          <div style={{background:"#fff",borderRadius:14,padding:"28px 16px",marginBottom:14,border:"1px solid #eee",textAlign:"center"}}>
            <div style={{fontSize:56,marginBottom:10}}>{q.icon}</div>
            <div style={{fontSize:17,fontWeight:700,color:"#1a1a1a",marginBottom:4}}>{q.eng}</div>
            <div style={{fontSize:11,color:"#bbb"}}>Choose the correct Spanish expression</div>
          </div>

          {/* Answer grid */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
            {q.options.map(opt=>{
              const isCorrect=opt===q.expr;
              const isChosen=opt===chosen;
              let bg="#fff",border="1.5px solid #eee",col="#333";
              if(chosen){
                if(isCorrect){bg="#E8F5E9";border="2px solid #2E7D32";col="#1B5E20";}
                else if(isChosen){bg="#FFEBEE";border="2px solid #C62828";col="#B71C1C";}
                else{col="#ccc";}
              }
              return(
                <button key={opt} onClick={()=>handleAnswer(opt)} style={{padding:"14px 8px",borderRadius:10,border,background:bg,color:col,fontSize:12,fontWeight:700,cursor:chosen?"default":"pointer",transition:"all 0.15s",textAlign:"center",lineHeight:1.3}}>
                  {chosen&&isCorrect?"✓ ":chosen&&isChosen&&!isCorrect?"✗ ":""}{opt}
                </button>
              );
            })}
          </div>

          {chosen&&(<button onClick={handleNext} style={{width:"100%",padding:"12px",borderRadius:10,border:"none",background:"#0277BD",color:"#fff",fontSize:14,fontWeight:800,cursor:"pointer"}}>
            {qIdx+1>=questions.length?"See Results →":"Next →"}
          </button>)}
        </div>
      ):(
        <div>
          <div style={{background:"#1a1a1a",borderRadius:14,padding:"28px 20px",marginBottom:16,color:"#fff",textAlign:"center"}}>
            <div style={{fontSize:44,marginBottom:10}}>{score>=questions.length*0.8?"🏆":score>=questions.length*0.5?"👍":"📖"}</div>
            <div style={{fontSize:26,fontWeight:800,marginBottom:6}}>{score}/{questions.length}</div>
            <div style={{fontSize:13,color:"#aaa"}}>{score>=questions.length*0.8?"¡Excelente! Muy bien hecho.":score>=questions.length*0.5?"¡Bien! Keep practicing.":"¡Ánimo! Review the expressions and try again."}</div>
          </div>
          <button onClick={resetQuiz} style={{width:"100%",padding:"13px",borderRadius:10,border:"none",background:"#0277BD",color:"#fff",fontSize:14,fontWeight:800,cursor:"pointer"}}>🔄 Try Again</button>
        </div>
      )}
    </div>)}
  </div>);
}

const guideComponents=[Guide1,Guide2,Guide3,Guide4,Guide5,Guide6,Guide7,Guide8,Guide9,Guide10,Guide11,Guide12,Guide13,Guide14,Guide15,Guide16,Guide17,Guide18,Guide19,Guide20,Guide21,Guide22,Guide23,Guide24,Guide25,Guide26,Guide27];

// MAIN APP
// ═══════════════════════════════════════════════════════════════
const App = function SpanishGuide(){
  const [page,setPage]=useState(0);
  const [menuOpen,setMenuOpen]=useState(false);
  const contentRef=useRef(null);
  const meta=guidesMeta[page];
  const GuideComp=guideComponents[page];

  const goTo=(i)=>{setPage(i);setMenuOpen(false);if(contentRef.current)contentRef.current.scrollTop=0;};
  const prev=()=>{if(page>0)goTo(page-1);};
  const next=()=>{if(page<26)goTo(page+1);};

  useEffect(()=>{
    const handler=(e)=>{if(e.key==="ArrowLeft")prev();if(e.key==="ArrowRight")next();};
    window.addEventListener("keydown",handler);return()=>window.removeEventListener("keydown",handler);
  });

  return(
    <div style={{height:"100vh",display:"flex",flexDirection:"column",background:"#FAFAF6",fontFamily:"'Segoe UI','Helvetica Neue',sans-serif",overflow:"hidden",position:"relative"}}>
      <style>{`@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}@keyframes slideIn{from{transform:translateX(-100%)}to{transform:translateX(0)}}@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}*{box-sizing:border-box}::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#ddd;border-radius:4px}`}</style>

      {/* TOP BAR */}
      <div style={{background:"#fff",borderBottom:"1px solid #eee",padding:"10px 16px",display:"flex",alignItems:"center",gap:12,flexShrink:0,zIndex:10}}>
        <button onClick={()=>setMenuOpen(!menuOpen)} style={{width:36,height:36,borderRadius:10,border:"1.5px solid #e0ddd8",background:"#fff",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,color:"#555",flexShrink:0}}>☰</button>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:14,fontWeight:800,color:"#1a1a1a",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{meta.icon} {meta.title}</div>

        </div>
        <div style={{background:meta.color,color:"#fff",padding:"3px 10px",borderRadius:6,fontSize:10,fontWeight:700,flexShrink:0}}>
          {page+1}/27
        </div>
      </div>

      {/* CONTENT */}
      <div ref={contentRef} style={{flex:1,overflow:"auto",padding:"16px",position:"relative"}}>
        <div key={page} style={{animation:"fadeIn 0.2s ease",maxWidth:700,margin:"0 auto"}}>
          <GuideComp/>
        </div>
      </div>

      {/* BOTTOM NAV */}
      <div style={{background:"#fff",borderTop:"1px solid #eee",padding:"8px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <button onClick={prev} disabled={page===0} style={{padding:"8px 20px",borderRadius:10,border:"1.5px solid #e0ddd8",background:page===0?"#f5f5f5":"#fff",color:page===0?"#ccc":"#555",fontSize:13,fontWeight:700,cursor:page===0?"default":"pointer"}}>← Prev</button>
        <div style={{display:"flex",gap:3}}>
          {guidesMeta.map((_,i)=>(<div key={i} onClick={()=>goTo(i)} style={{width:i===page?16:6,height:6,borderRadius:3,background:i===page?meta.color:"#ddd",cursor:"pointer",transition:"all 0.2s"}}/>))}
        </div>
        <button onClick={next} disabled={page===26} style={{padding:"8px 20px",borderRadius:10,border:"1.5px solid #e0ddd8",background:page===24?"#f5f5f5":"#fff",color:page===24?"#ccc":"#555",fontSize:13,fontWeight:700,cursor:page===24?"default":"pointer"}}>Next →</button>
      </div>

      {/* SIDE MENU OVERLAY */}
      {menuOpen&&<div onClick={()=>setMenuOpen(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:20}}/>}
      <div style={{position:"fixed",top:0,left:0,bottom:0,width:280,background:"#fff",zIndex:30,transform:menuOpen?"translateX(0)":"translateX(-100%)",transition:"transform 0.25s ease",boxShadow:menuOpen?"4px 0 24px rgba(0,0,0,0.15)":"none",display:"flex",flexDirection:"column"}}>
        <div style={{padding:"16px 20px",borderBottom:"1px solid #eee",flexShrink:0}}>
          <div style={{fontSize:18,fontWeight:800,color:"#1a1a1a"}}>Guía de Español</div>
          <div style={{fontSize:12,color:"#999"}}>27 Interactive Guides</div>
        </div>
        <div style={{flex:1,overflow:"auto",padding:"8px 0"}}>
          {categories.map(cat=>{
            const items=guidesMeta.filter(g=>g.cat===cat);
            return(<div key={cat}>
              <div style={{padding:"6px 20px",fontSize:10,fontWeight:700,color:catColors[cat],textTransform:"uppercase",letterSpacing:1.5,marginTop:4}}>{cat}</div>
              {items.map(g=>{const idx=g.id-1;const isActive=idx===page;return(
                <button key={g.id} onClick={()=>goTo(idx)} style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:"8px 20px",border:"none",background:isActive?`${g.color}12`:"transparent",cursor:"pointer",textAlign:"left",borderLeft:isActive?`3px solid ${g.color}`:"3px solid transparent"}}>
                  <span style={{fontSize:14,width:22,textAlign:"center"}}>{g.icon}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:isActive?800:600,color:isActive?g.color:"#333",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{g.title}</div>
                    <div style={{fontSize:10,color:"#999"}}>{g.subtitle}</div>
                  </div>
                  <span style={{fontSize:10,color:"#ccc",fontWeight:600}}>{g.id}</span>
                </button>
              );})}
            </div>);
          })}
        </div>
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
