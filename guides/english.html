// ═══════════════════════════════════════════════════════════════
function Card({color,title,subtitle,children}){
  return(<div style={{background:"#fff",borderRadius:14,overflow:"hidden",border:"1px solid #e0dcd5",marginBottom:16}}>
    <div style={{background:color,padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>

      {subtitle&&<span style={{color:"rgba(255,255,255,0.6)",fontSize:11}}>{subtitle}</span>}
    </div>{children}
  </div>);
}
function DarkBox({title,children}){
  return(<div style={{background:"linear-gradient(135deg,#1a1a1a,#252525)",borderRadius:14,padding:"16px 20px",marginBottom:16,color:"#fff",textAlign:"center"}}>
    {title&&<div style={{fontSize:10,color:"#666",letterSpacing:2,textTransform:"uppercase",marginBottom:8,fontWeight:600}}>{title}</div>}{children}
  </div>);
}
function Insight({text}){return(<div style={{background:"#FFF8E7",borderRadius:10,padding:"10px 14px",marginBottom:12,border:"1px solid #F0E4C4",fontSize:12,color:"#8B6914",lineHeight:1.5}}>💡 {text}</div>);}
function EsNote({text}){return(<div style={{background:"#FFEBEE",borderRadius:10,padding:"10px 14px",marginBottom:12,border:"1px solid #FFCDD2",fontSize:12,color:"#C62828",lineHeight:1.5}}>🇪🇸 <strong>Para hispanohablantes:</strong> {text}</div>);}
function ChattNote({text}){return(<div style={{background:"#E3F2FD",borderRadius:10,padding:"10px 14px",marginBottom:12,border:"1px solid #BBDEFB",fontSize:12,color:"#0D47A1",lineHeight:1.5}}>🏔 <strong>Chattanooga/Southern:</strong> {text}</div>);}
function SG({items}){
  return(<div>{items.map((item,i)=>(<div key={i} style={{background:"#fff",borderRadius:10,padding:"10px 14px",border:"1px solid #e0dcd5",marginBottom:6}}>
    <div style={{fontSize:13,fontWeight:700,color:"#1a1a1a",marginBottom:4}}>{item.h}</div>
    <div style={{fontSize:12,color:"#666",lineHeight:1.6,whiteSpace:"pre-line"}}>{item.b}</div>
  </div>))}</div>);
}
function ExpandSection({label,color,children}){
  const[open,setOpen]=useState(false);
  return(<div style={{marginBottom:8}}>
    <button onClick={()=>setOpen(!open)} style={{width:"100%",padding:"10px 16px",borderRadius:10,border:"1.5px solid #e0dcd5",background:open?color||"#1a1a1a":"#fff",color:open?"#fff":"#555",fontSize:13,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
      <span>{label}</span><span style={{fontSize:16,transition:"transform 0.2s",transform:open?"rotate(180deg)":"rotate(0)"}}>⌄</span>
    </button>
    {open&&<div style={{marginTop:8}}>{children}</div>}
  </div>);
}

// ═══════════════════════════════════════════════════════════════
// GUIDE 1: ALPHABET
// ═══════════════════════════════════════════════════════════════
function Guide1(){
  const vowels="AEIOU".split("");
  const consonants="BCDFGHJKLMNPQRSTVWXYZ".split("");
  return(<div>
    <DarkBox title="26 Letters, ~44 Sounds"><div style={{fontSize:14,lineHeight:1.6}}>
      Spanish has near-perfect spelling: one letter = one sound. English is <strong style={{color:"#EF9A9A"}}>chaotic</strong>: the letter 'a' alone can make 6+ different sounds. This is the #1 challenge.
    </div></DarkBox>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(40px,1fr))",gap:4,marginBottom:16}}>
      {[...vowels,...consonants].sort().map(l=>{const isV=vowels.includes(l);return(
        <div key={l} style={{aspectRatio:"1",borderRadius:8,background:isV?"#FFEBEE":"#fff",border:isV?"2px solid #FFCDD2":"1.5px solid #e0dcd5",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:700,color:isV?"#C62828":"#333"}}>{l}</div>
      );})}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
      <div style={{background:"#FFEBEE",borderRadius:10,padding:"12px",textAlign:"center",border:"1px solid #FFCDD2"}}>
        <div style={{fontSize:24,fontWeight:800,color:"#C62828"}}>5</div>
        <div style={{fontSize:12,color:"#C62828"}}>Vowel letters</div>
        <div style={{fontSize:10,color:"#888",marginTop:2}}>But ~15 vowel SOUNDS</div>
      </div>
      <div style={{background:"#E3F2FD",borderRadius:10,padding:"12px",textAlign:"center",border:"1px solid #BBDEFB"}}>
        <div style={{fontSize:24,fontWeight:800,color:"#1565C0"}}>21</div>
        <div style={{fontSize:12,color:"#1565C0"}}>Consonant letters</div>
        <div style={{fontSize:10,color:"#888",marginTop:2}}>Plus ~24 consonant sounds</div>
      </div>
    </div>
    <EsNote text="En español, si ves una letra, sabes cómo suena. En inglés, la misma letra puede sonar completamente diferente según la palabra. 'A' suena distinto en: cat, cake, car, call, about."/>
  </div>);
}

// GUIDE 2: VOWEL SOUNDS
// ═══════════════════════════════════════════════════════════════
const vowelPairs=[
  {en1:"ship",ipa1:"/ɪ/",en2:"sheep",ipa2:"/iː/",es:"español solo tiene /i/",color:"#C62828"},
  {en1:"full",ipa1:"/ʊ/",en2:"fool",ipa2:"/uː/",es:"español solo tiene /u/",color:"#1565C0"},
  {en1:"cat",ipa1:"/æ/",en2:"cut",ipa2:"/ʌ/",es:"ambos suenan como 'a' para hispanohablantes",color:"#2E7D32"},
  {en1:"bed",ipa1:"/ɛ/",en2:"bad",ipa2:"/æ/",es:"el segundo no existe en español",color:"#6A1B9A"},
  {en1:"not",ipa1:"/ɑː/",en2:"note",ipa2:"/oʊ/",es:"la 'o' inglesa es un diptongo",color:"#E65100"},
];

function Guide2(){
  return(<div>
    <DarkBox title="The Schwa: English's Secret Sound"><div style={{fontSize:14,lineHeight:1.6}}>
      The most common sound in English is <strong style={{color:"#FFE77A"}}>schwa /ə/</strong> — a lazy, unstressed "uh." It doesn't exist in Spanish. It appears in: <em>about, banana, problem, support, the</em>.
    </div></DarkBox>
    <Card color="#C62828" title="Vowel Pairs That Cause Problems">
      {vowelPairs.map((p,i)=>(<div key={i} style={{padding:"10px 16px",borderBottom:i<vowelPairs.length-1?"1px solid #f0eeeb":"none"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:4}}>
          <div style={{textAlign:"center",minWidth:70}}>
            <div style={{fontSize:16,fontWeight:800,color:p.color}}>{p.en1}</div>
            <div style={{fontSize:11,color:"#888",fontFamily:"monospace"}}>{p.ipa1}</div>
          </div>
          <div style={{fontSize:16,color:"#ccc"}}>vs</div>
          <div style={{textAlign:"center",minWidth:70}}>
            <div style={{fontSize:16,fontWeight:800,color:p.color}}>{p.en2}</div>
            <div style={{fontSize:11,color:"#888",fontFamily:"monospace"}}>{p.ipa2}</div>
          </div>
        </div>
        <div style={{fontSize:11,color:"#888",fontStyle:"italic"}}>{p.es}</div>
      </div>))}
    </Card>
    <EsNote text="El inglés tiene ~15 sonidos vocálicos. El español tiene 5. Esto significa que muchas palabras inglesas que suenan 'igual' para ti son en realidad diferentes. ship ≠ sheep, cat ≠ cut."/>
    <ChattNote text="In Chattanooga, the 'pen/pin merger' is strong — 'pen' and 'pin' sound identical (both like 'pin'). Same with 'ten/tin', 'hem/him'. You'll hear this everywhere locally."/>
  </div>);
}

// ═══════════════════════════════════════════════════════════════
// GUIDE 3: CONSONANT CHALLENGES
// ═══════════════════════════════════════════════════════════════
function Guide3(){
  const challenges=[
    {sound:"/v/ vs /b/",en:"very ≠ berry, vote ≠ boat",tip:"For /v/, upper teeth touch lower lip. Spanish B/V are the same — English B/V are NOT.",color:"#C62828"},
    {sound:"/ʃ/ (sh)",en:"ship, show, push",tip:"Put your lips forward like blowing out a candle and say 'shhh'. Spanish doesn't have this.",color:"#1565C0"},
    {sound:"/dʒ/ (j)",en:"judge, job, age",tip:"Like 'ch' but voiced (throat vibrates). NOT the Spanish J (which is /x/).",color:"#2E7D32"},
    {sound:"/z/",en:"zoo, easy, is, has",tip:"Like /s/ but voiced. Put your hand on your throat — you should feel vibration.",color:"#6A1B9A"},
    {sound:"/θ/ & /ð/ (th)",en:"think vs the",tip:"Tongue between teeth! /θ/ = unvoiced (think). /ð/ = voiced (the, this).",color:"#E65100"},
    {sound:"Initial S + consonant",en:"stop, speak, school",tip:"NO 'e' before it! Spanish adds 'e-': escuela, especial. English: school, special. Practice: 'ssssstop'.",color:"#880E4F"},
    {sound:"Final consonant clusters",en:"texts /teksts/, strengths",tip:"English piles consonants at the end of words. Don't drop them or add vowels after.",color:"#00695C"},
  ];
  return(<div>
    {challenges.map((c,i)=>(<div key={i} style={{background:"#fff",borderRadius:10,padding:"10px 14px",border:`2px solid ${c.color}20`,marginBottom:6}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
        <span style={{background:c.color,color:"#fff",padding:"2px 10px",borderRadius:6,fontSize:13,fontWeight:800,fontFamily:"monospace"}}>{c.sound}</span>
        <span style={{fontSize:13,color:"#555",fontStyle:"italic"}}>{c.en}</span>
      </div>
      <div style={{fontSize:12,color:"#666",lineHeight:1.5}}>{c.tip}</div>
    </div>))}
    <ChattNote text="Southern American English often softens or drops final consonants: 'didn't' → 'din't', 'last night' → 'las' night'. This is normal locally — you'll hear it but should still practice the full forms for formal situations."/>
  </div>);
}

// ═══════════════════════════════════════════════════════════════
// GUIDE 4: SPELLING
// ═══════════════════════════════════════════════════════════════
function Guide4(){return(<div>
  <DarkBox title="Why Is English Spelling So Crazy?"><div style={{fontSize:13,lineHeight:1.6}}>
    English borrowed from Latin, French, German, Greek, Norse, and more — and often <strong style={{color:"#EF9A9A"}}>kept the original spellings</strong> while pronunciation evolved. The result: pure chaos.
  </div></DarkBox>
  <SG items={[
    {h:"-ough = 7 different sounds!",b:"through /uː/ · though /oʊ/ · thought /ɔː/\ntough /ʌf/ · cough /ɒf/ · bough /aʊ/ · hiccough /ʌp/"},
    {h:"Common patterns that DO work",b:"-tion = /ʃən/ (nation, education, information)\n-ight = /aɪt/ (night, light, fight, right)\n-ness = /nəs/ (happiness, darkness, kindness)\n-ful = /fəl/ (beautiful, wonderful, careful)"},
    {h:"Silent letters",b:"K in: know, knee, knife, knock\nW in: write, wrong, wrist, wrap\nB in: comb, bomb, climb, thumb\nGH in: night, daughter, though, weight"},
    {h:"Same spelling, different sound",b:"read (present) /riːd/ vs read (past) /rɛd/\nlead (metal) /lɛd/ vs lead (guide) /liːd/\nwind (air) /wɪnd/ vs wind (turn) /waɪnd/"},
  ]}/>
  <EsNote text="No existe una regla confiable. Tienes que memorizar la ortografía de cada palabra. La buena noticia: autocorrect exists. La mala: todavía necesitas leer y reconocer palabras."/>
</div>);}

// ═══════════════════════════════════════════════════════════════
// GUIDE 5: STRESS & INTONATION
// ═══════════════════════════════════════════════════════════════
function Guide5(){
  const stressPairs=[
    {w1:"REcord",m1:"noun (disco, registro)",w2:"reCORD",m2:"verb (grabar)"},
    {w1:"PREsent",m1:"noun/adj (regalo, presente)",w2:"preSENT",m2:"verb (presentar)"},
    {w1:"OBject",m1:"noun (objeto)",w2:"obJECT",m2:"verb (objetar)"},
    {w1:"PERmit",m1:"noun (permiso)",w2:"perMIT",m2:"verb (permitir)"},
    {w1:"CONtract",m1:"noun (contrato)",w2:"conTRACT",m2:"verb (contratar)"},
  ];
  return(<div>
    <DarkBox title="English = Stress-Timed"><div style={{fontSize:13,lineHeight:1.6}}>
      Spanish gives each syllable equal time. English <strong style={{color:"#FFE77A"}}>rushes through unstressed syllables</strong> and hangs on stressed ones. This creates the characteristic English "rhythm."
    </div></DarkBox>
    <Card color="#E65100" title="Stress Changes Meaning">
      {stressPairs.map((p,i)=>(<div key={i} style={{display:"grid",gridTemplateColumns:"1fr 1fr",padding:"8px 16px",borderBottom:i<stressPairs.length-1?"1px solid #f0eeeb":"none"}}>
        <div><span style={{fontWeight:800,color:"#E65100"}}>{p.w1}</span><br/><span style={{fontSize:11,color:"#888"}}>{p.m1}</span></div>
        <div><span style={{fontWeight:800,color:"#1565C0"}}>{p.w2}</span><br/><span style={{fontSize:11,color:"#888"}}>{p.m2}</span></div>
      </div>))}
    </Card>
    <ChattNote text="The 'Southern drawl' stretches vowels and adds a melodic rise-fall pattern. Words get extra syllables: 'well' → 'we-ull', 'can't' → 'cay-unt'. This isn't wrong — it's the local music of the language."/>
    <EsNote text="El error más común: dar la misma duración a cada sílaba. En inglés, las sílabas sin acento casi desaparecen. 'Banana' suena como 'buh-NA-nuh' — la primera y última sílaba se reducen a schwa."/>
  </div>);
}

function Guide6(){return(<div>
  <SG items={[
    {h:"Simple Present = habitual / general truth",b:"I work every day. = Trabajo cada día.\nShe speaks English. = Ella habla inglés.\nWater boils at 100°C. = El agua hierve a 100°C.\n⚠ Add -s/-es for he/she/it: he works, she goes, it rains"},

</div>);}

function Guide7(){
  const irregs=[
    {base:"go",past:"went",pp:"gone"},{base:"come",past:"came",pp:"come"},{base:"see",past:"saw",pp:"seen"},
    {base:"take",past:"took",pp:"taken"},{base:"give",past:"gave",pp:"given"},{base:"make",past:"made",pp:"made"},
    {base:"get",past:"got",pp:"gotten"},{base:"know",past:"knew",pp:"known"},{base:"think",past:"thought",pp:"thought"},
    {base:"say",past:"said",pp:"said"},{base:"tell",past:"told",pp:"told"},{base:"find",past:"found",pp:"found"},
    {base:"eat",past:"ate",pp:"eaten"},{base:"drink",past:"drank",pp:"drunk"},{base:"write",past:"wrote",pp:"written"},
    {base:"buy",past:"bought",pp:"bought"},{base:"bring",past:"brought",pp:"brought"},{base:"teach",past:"taught",pp:"taught"},
  ];
  return(<div>
    <SG items={[
      {h:"Regular -ed: THREE pronunciations",b:"/t/ after voiceless: worked, stopped, watched\n/d/ after voiced: played, opened, called\n/ɪd/ after t or d: wanted, needed, started"},
    ]}/>
    <Card color="#C62828" title="18 Essential Irregular Verbs">
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",padding:"6px 14px",fontSize:10,fontWeight:700,color:"#999",borderBottom:"1px solid #eee"}}>
        <div>Base</div><div>Past</div><div>Participle</div>
      </div>
      {irregs.map((v,i)=>(<div key={i} style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",padding:"5px 14px",borderBottom:i<irregs.length-1?"1px solid #f0eeeb":"none",fontSize:13}}>

const App = function EnglishGuide(){
  const[page,setPage]=useState(0);
  const[menuOpen,setMenuOpen]=useState(false);
  const contentRef=useRef(null);
  const meta=guidesMeta[page];
  const GuideComp=guideComponents[page];
  const total=guidesMeta.length;

  const goTo=(i)=>{setPage(i);setMenuOpen(false);if(contentRef.current)contentRef.current.scrollTop=0;};
  const prev=()=>{if(page>0)goTo(page-1);};
  const next=()=>{if(page<total-1)goTo(page+1);};

  useEffect(()=>{
    const handler=(e)=>{if(e.key==="ArrowLeft")prev();if(e.key==="ArrowRight")next();};
    window.addEventListener("keydown",handler);return()=>window.removeEventListener("keydown",handler);
  });

  return(
    <div style={{height:"100vh",display:"flex",flexDirection:"column",background:"#FAFAF6",fontFamily:"'Segoe UI','Helvetica Neue',sans-serif",overflow:"hidden",position:"relative"}}>
      <style>{`@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}*{box-sizing:border-box}::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#ddd;border-radius:4px}`}</style>

      <div style={{background:"#fff",borderBottom:"1px solid #eee",padding:"10px 16px",display:"flex",alignItems:"center",gap:12,flexShrink:0,zIndex:10}}>
        <button onClick={()=>setMenuOpen(!menuOpen)} style={{width:36,height:36,borderRadius:10,border:"1.5px solid #e0ddd5",background:"#fff",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,color:"#555",flexShrink:0}}>☰</button>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:14,fontWeight:800,color:"#1a1a1a",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{meta.icon} {meta.title}</div>
          <div style={{fontSize:11,color:"#999"}}>{meta.subtitle}</div>
        </div>
        <div style={{background:meta.color,color:"#fff",padding:"3px 10px",borderRadius:6,fontSize:10,fontWeight:700,flexShrink:0}}>{page+1}/{total}</div>
      </div>

      <div ref={contentRef} style={{flex:1,overflow:"auto",padding:"16px",position:"relative"}}>
        <div key={page} style={{animation:"fadeIn 0.2s ease",maxWidth:700,margin:"0 auto"}}><GuideComp/></div>
      </div>

      <div style={{background:"#fff",borderTop:"1px solid #eee",padding:"8px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <button onClick={prev} disabled={page===0} style={{padding:"8px 20px",borderRadius:10,border:"1.5px solid #e0ddd5",background:page===0?"#f5f5f5":"#fff",color:page===0?"#ccc":"#555",fontSize:13,fontWeight:700,cursor:page===0?"default":"pointer"}}>← Prev</button>
        <div style={{display:"flex",gap:2}}>
          {guidesMeta.map((_,i)=>(<div key={i} onClick={()=>goTo(i)} style={{width:i===page?12:3,height:3,borderRadius:2,background:i===page?meta.color:"#ddd",cursor:"pointer",transition:"all 0.2s"}}/>))}
        </div>
        <button onClick={next} disabled={page===total-1} style={{padding:"8px 20px",borderRadius:10,border:"1.5px solid #e0ddd5",background:page===total-1?"#f5f5f5":"#fff",color:page===total-1?"#ccc":"#555",fontSize:13,fontWeight:700,cursor:page===total-1?"default":"pointer"}}>Next →</button>
      </div>

      {menuOpen&&<div onClick={()=>setMenuOpen(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:20}}/>}
      <div style={{position:"fixed",top:0,left:0,bottom:0,width:280,background:"#fff",zIndex:30,transform:menuOpen?"translateX(0)":"translateX(-100%)",transition:"transform 0.25s ease",boxShadow:menuOpen?"4px 0 24px rgba(0,0,0,0.15)":"none",display:"flex",flexDirection:"column"}}>
        <div style={{padding:"16px 20px",borderBottom:"1px solid #eee",flexShrink:0}}>
          <div style={{fontSize:18,fontWeight:800,color:"#1a1a1a"}}>American English</div>
          <div style={{fontSize:12,color:"#999"}}>Para hispanohablantes · 35 guías</div>
        </div>
        <div style={{flex:1,overflow:"auto",padding:"8px 0"}}>
          {categories.map(cat=>{
            const items=guidesMeta.filter(g=>g.cat===cat);
            return(<div key={cat}>
              <div style={{padding:"6px 20px",fontSize:10,fontWeight:700,color:catColors[cat],textTransform:"uppercase",letterSpacing:1.5,marginTop:4}}>{cat}</div>
              {items.map(g=>{const idx=g.id-1;const isActive=idx===page;return(
                <button key={g.id} onClick={()=>goTo(idx)} style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:"8px 20px",border:"none",background:isActive?`${g.color}12`:"transparent",cursor:"pointer",textAlign:"left",borderLeft:isActive?`3px solid ${g.color}`:"3px solid transparent"}}>
                  <span style={{fontSize:14,width:22,textAlign:"center"}}>{g.icon}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:isActive?800:600,color:isActive?g.color:"#333",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{g.title}</div>
                    <div style={{fontSize:10,color:"#999"}}>{g.subtitle}</div>
                  </div>
                  <span style={{fontSize:10,color:"#ccc",fontWeight:600}}>{g.id}</span>
                </button>
              );})}
            </div>);
          })}
        </div>
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
