// METADATA
const guidesMeta = [

  {id:2,title:"Vowel Sounds",subtitle:"15 vocales vs tus 5",cat:"Pronunciación",color:"#C62828",icon:"🗣"},
  {id:3,title:"Consonant Challenges",subtitle:"Sonidos que no existen en español",cat:"Pronunciación",color:"#2E7D32",icon:"👅"},
  {id:4,title:"Spelling Patterns",subtitle:"La ortografía caótica del inglés",cat:"Pronunciación",color:"#6A1B9A",icon:"✍"},
  {id:5,title:"Stress & Rhythm",subtitle:"El ritmo del inglés americano",cat:"Pronunciación",color:"#E65100",icon:"🎵"},
  {id:6,title:"Simple Present",subtitle:"I work vs I am working",cat:"Verbos",color:"#1565C0",icon:"▶"},
  {id:7,title:"Simple Past",subtitle:"-ed y los 200 irregulares",cat:"Verbos",color:"#C62828",icon:"⏪"},
  {id:8,title:"Future",subtitle:"Will vs going to vs fixin' to",cat:"Verbos",color:"#00695C",icon:"⏩"},
  {id:9,title:"Present Perfect",subtitle:"I have done vs I did",cat:"Verbos",color:"#6A1B9A",icon:"✓"},
  {id:10,title:"Modals",subtitle:"Can, should, must, might could",cat:"Verbos",color:"#E65100",icon:"💪"},
  {id:11,title:"Conditionals",subtitle:"Las 4 condicionales + if I were",cat:"Verbos",color:"#880E4F",icon:"🔀"},
  {id:12,title:"Passive Voice",subtitle:"Was built, is being done, got fired",cat:"Verbos",color:"#00838F",icon:"📝"},
  {id:13,title:"Phrasal Verbs",subtitle:"Get up, get over, get by...",cat:"Verbos",color:"#4527A0",icon:"🧩"},
  {id:14,title:"Articles",subtitle:"A/An vs The vs nada",cat:"Sustantivos",color:"#C62828",icon:"📎"},
  {id:15,title:"Countable vs Uncountable",subtitle:"Much/many, some/any",cat:"Sustantivos",color:"#1565C0",icon:"📊"},
  {id:16,title:"Plurals",subtitle:"Regulares, irregulares y rarezas",cat:"Sustantivos",color:"#2E7D32",icon:"➕"},
  {id:17,title:"Possessives",subtitle:"'s, of, mine, its vs it's",cat:"Sustantivos",color:"#E65100",icon:"🏠"},
  {id:18,title:"Pronouns",subtitle:"Sujeto, objeto, reflexivo",cat:"Pronombres",color:"#1565C0",icon:"👤"},
  {id:19,title:"Y'all",subtitle:"El plural de 'you' que falta",cat:"Pronombres",color:"#C62828",icon:"👥"},
  {id:20,title:"Demonstratives",subtitle:"This, that, every, enough",cat:"Pronombres",color:"#6A1B9A",icon:"👉"},
  {id:21,title:"Adjective Order",subtitle:"La regla secreta que nadie explica",cat:"Adjetivos",color:"#2E7D32",icon:"📐"},
  {id:22,title:"Comparatives",subtitle:"-er/-est, more/most, right good",cat:"Adjetivos",color:"#E65100",icon:"⬆"},
  {id:23,title:"Adverbs",subtitle:"Dónde van y cuándo usar -ly",cat:"Adjetivos",color:"#00695C",icon:"↔"},
  {id:24,title:"In / On / At",subtitle:"Preposiciones sin lógica",cat:"Preposiciones",color:"#C62828",icon:"📍"},
  {id:25,title:"Verb + Preposition",subtitle:"Depend ON, interested IN",cat:"Preposiciones",color:"#4527A0",icon:"🔗"},
  {id:26,title:"Connectors",subtitle:"Because, although, however",cat:"Preposiciones",color:"#1565C0",icon:"🔀"},
  {id:27,title:"Word Order",subtitle:"SVO, do/does/did, tags",cat:"Oraciones",color:"#C62828",icon:"❓"},
  {id:28,title:"Reported Speech",subtitle:"Dijo que... + retroceso de tiempo",cat:"Oraciones",color:"#6A1B9A",icon:"💬"},
  {id:29,title:"Relative Clauses",subtitle:"Who, which, that, whose",cat:"Oraciones",color:"#2E7D32",icon:"🔗"},
  {id:30,title:"Errores Comunes",subtitle:"Falsos amigos y trampas típicas",cat:"Oraciones",color:"#E65100",icon:"⚠"},
  {id:31,title:"Registro y Formalidad",subtitle:"Sir, ma'am, emails, textos",cat:"Práctico",color:"#880E4F",icon:"🎩"},
  {id:32,title:"Modismos",subtitle:"Bless your heart y más",cat:"Práctico",color:"#00695C",icon:"💡"},
  {id:33,title:"Números y Medidas",subtitle:"Imperial, Fahrenheit, propinas",cat:"Práctico",color:"#1565C0",icon:"💲"},
  {id:34,title:"Small Talk",subtitle:"La cultura de la charla casual",cat:"Práctico",color:"#4527A0",icon:"🤝"},
  {id:35,title:"Inglés de Chattanooga",subtitle:"El dialecto local explicado",cat:"Práctico",color:"#E65100",icon:"🏔"},
];
const categories=["Pronunciación","Verbos","Sustantivos","Pronombres","Adjetivos","Preposiciones","Oraciones","Práctico"];
const catColors={Pronunciación:"#1565C0",Verbos:"#C62828",Sustantivos:"#C62828",Pronombres:"#1565C0",Adjetivos:"#2E7D32",Preposiciones:"#4527A0",Oraciones:"#C62828",Práctico:"#880E4F"};

// COMPONENTES COMPARTIDOS
function Card({color,title,subtitle,children}){
  return(<div style={{background:"#fff",borderRadius:14,overflow:"hidden",border:"1px solid #e0dcd5",marginBottom:16}}>
    <div style={{background:color,padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <span style={{color:"#fff",fontSize:15,fontWeight:800}}>{title}</span>
      {subtitle&&<span style={{color:"rgba(255,255,255,0.6)",fontSize:11}}>{subtitle}</span>}
    </div>{children}
  </div>);
}
function DarkBox({title,children}){
  return(<div style={{background:"linear-gradient(135deg,#1a1a1a,#252525)",borderRadius:14,padding:"16px 20px",marginBottom:16,color:"#fff",textAlign:"center"}}>
    {title&&<div style={{fontSize:10,color:"#666",letterSpacing:2,textTransform:"uppercase",marginBottom:8,fontWeight:600}}>{title}</div>}{children}
  </div>);
}
function Nota({text}){return(<div style={{background:"#FFF8E7",borderRadius:10,padding:"10px 14px",marginBottom:12,border:"1px solid #F0E4C4",fontSize:12,color:"#8B6914",lineHeight:1.5}}>{"💡 "}{text}</div>);}
function Trampa({text}){return(<div style={{background:"#FFEBEE",borderRadius:10,padding:"10px 14px",marginBottom:12,border:"1px solid #FFCDD2",fontSize:12,color:"#C62828",lineHeight:1.5}}>{"⚠️ "}<strong>Trampa para hispanohablantes:</strong> {text}</div>);}
function Chatt({text}){return(<div style={{background:"#E3F2FD",borderRadius:10,padding:"10px 14px",marginBottom:12,border:"1px solid #BBDEFB",fontSize:12,color:"#0D47A1",lineHeight:1.5}}>{"🏔 "}<strong>En Chattanooga:</strong> {text}</div>);}
function SG({items}){
  return(<div>{items.map((item,i)=>(<div key={i} style={{background:"#fff",borderRadius:10,padding:"10px 14px",border:"1px solid #e0dcd5",marginBottom:6}}>
    <div style={{fontSize:13,fontWeight:700,color:"#1a1a1a",marginBottom:4}}>{item.h}</div>
    <div style={{fontSize:12,color:"#666",lineHeight:1.6,whiteSpace:"pre-line"}}>{item.b}</div>
  </div>))}</div>);
}

// GUÍA 1-5: PRONUNCIACIÓN
function Guide1(){
  const vowels="AEIOU".split("");
  const [filter,setFilter]=useState("all");
  const all="ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
  const filtered=filter==="all"?all:filter==="vowels"?vowels:all.filter(l=>!vowels.includes(l));
  return(<div>
    <DarkBox title="El problema fundamental"><div style={{fontSize:14,lineHeight:1.6}}>En español, una letra = un sonido. En inglés, la letra <strong style={{color:"#EF9A9A"}}>"a"</strong> sola puede hacer <strong style={{color:"#FFE77A"}}>6 sonidos diferentes</strong>.</div></DarkBox>
    <div style={{display:"flex",gap:6,marginBottom:12,justifyContent:"center"}}>
      {[{id:"all",label:"Todas (26)"},{id:"vowels",label:"Vocales (5)"},{id:"consonants",label:"Consonantes (21)"}].map(f=>(
        <button key={f.id} onClick={()=>setFilter(f.id)} style={{padding:"6px 14px",borderRadius:16,border:filter===f.id?"2px solid #1565C0":"1.5px solid #ddd",background:filter===f.id?"#1565C0":"#fff",color:filter===f.id?"#fff":"#666",fontSize:11,fontWeight:600,cursor:"pointer"}}>{f.label}</button>
      ))}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(40px,1fr))",gap:4,marginBottom:16}}>
      {filtered.map(l=>{const isV=vowels.includes(l);return(
        <div key={l} style={{aspectRatio:"1",borderRadius:8,background:isV?"#FFEBEE":"#fff",border:isV?"2px solid #FFCDD2":"1.5px solid #e0dcd5",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:700,color:isV?"#C62828":"#333"}}>{l}</div>
      );})}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
      <div style={{background:"#FFEBEE",borderRadius:10,padding:"12px",textAlign:"center",border:"1px solid #FFCDD2"}}>
        <div style={{fontSize:24,fontWeight:800,color:"#C62828"}}>5</div>
        <div style={{fontSize:12,color:"#C62828"}}>letras vocales</div>
        <div style={{fontSize:10,color:"#888",marginTop:2}}>¡Pero ~15 SONIDOS vocálicos!</div>
      </div>
      <div style={{background:"#E3F2FD",borderRadius:10,padding:"12px",textAlign:"center",border:"1px solid #BBDEFB"}}>
        <div style={{fontSize:24,fontWeight:800,color:"#1565C0"}}>21</div>
        <div style={{fontSize:12,color:"#1565C0"}}>letras consonantes</div>
        <div style={{fontSize:10,color:"#888",marginTop:2}}>~24 sonidos consonánticos</div>
      </div>
    </div>
    <Trampa text="Si ves 'a' en una palabra inglesa, NO sabes cómo suena hasta aprender esa palabra. 'A' suena diferente en: cat /æ/, cake /eɪ/, car /ɑː/, call /ɔː/, about /ə/." />
  </div>);
}

function Guide2(){
  const parejas=[
    {en1:"ship",ipa1:"/ɪ/",en2:"sheep",ipa2:"/iː/",es:"El español solo tiene un sonido /i/. El inglés tiene dos.",color:"#C62828"},
    {en1:"full",ipa1:"/ʊ/",en2:"fool",ipa2:"/uː/",es:"El español solo tiene /u/. En inglés hay dos longitudes.",color:"#1565C0"},
    {en1:"cat",ipa1:"/æ/",en2:"cut",ipa2:"/ʌ/",es:"Ambos suenan como 'a' para ti, pero son MUY diferentes.",color:"#2E7D32"},
    {en1:"bed",ipa1:"/ɛ/",en2:"bad",ipa2:"/æ/",es:"El segundo sonido /æ/ no existe en español.",color:"#6A1B9A"},
    {en1:"not",ipa1:"/ɑː/",en2:"note",ipa2:"/oʊ/",es:"La 'o' inglesa en 'note' es realmente un diptongo /oʊ/.",color:"#E65100"},
  ];
  const [sel,setSel]=useState(null);
  return(<div>
    <DarkBox title="El sonido más importante: la schwa /ə/"><div style={{fontSize:14,lineHeight:1.6}}>El sonido más común del inglés es <strong style={{color:"#FFE77A"}}>schwa /ə/</strong> — una "a" débil e inacentuada. <strong style={{color:"#EF9A9A"}}>No existe en español.</strong> Aparece en: about, banana, problem, the.</div></DarkBox>
    <Card color="#C62828" title="Parejas vocálicas problemáticas" subtitle="Toca para comparar">
      {parejas.map((p,i)=>(<div key={i} onClick={()=>setSel(sel===i?null:i)} style={{padding:"10px 16px",borderBottom:i<parejas.length-1?"1px solid #f0eeeb":"none",cursor:"pointer",background:sel===i?"#FFF5F5":"transparent"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}><div style={{textAlign:"center",minWidth:70}}><div style={{fontSize:16,fontWeight:800,color:p.color}}>{p.en1}</div><div style={{fontSize:11,color:"#888",fontFamily:"monospace"}}>{p.ipa1}</div></div><div style={{fontSize:16,color:"#ccc",fontWeight:700}}>vs</div><div style={{textAlign:"center",minWidth:70}}><div style={{fontSize:16,fontWeight:800,color:p.color}}>{p.en2}</div><div style={{fontSize:11,color:"#888",fontFamily:"monospace"}}>{p.ipa2}</div></div></div>
        {sel===i&&<div style={{fontSize:12,color:"#888",fontStyle:"italic",marginTop:4,padding:"6px 8px",background:"#FFF8E7",borderRadius:6}}>{p.es}</div>}
      </div>))}
    </Card>
    <Chatt text="En Chattanooga, 'pen' y 'pin' suenan idénticos (ambos como 'pin'). Si alguien dice 'ink pen', está aclarando porque los sonidos se fusionan aquí." />
  </div>);
}

function Guide3(){
  const desafios=[
    {sound:"/v/ vs /b/",en:"very ≠ berry",tip:"Para /v/, dientes superiores tocan labio inferior. En español B/V suenan igual — en inglés NO.",color:"#C62828"},
    {sound:"/ʃ/ (sh)",en:"ship, show, push",tip:"Labios hacia adelante como soplando una vela y di 'shhh'. No existe en español.",color:"#1565C0"},
    {sound:"/dʒ/ (j)",en:"judge, job, gym",tip:"Como 'ch' pero con vibración. NO es la J española.",color:"#2E7D32"},
    {sound:"/z/",en:"zoo, easy, is, has",tip:"Como /s/ pero con vibración en la garganta.",color:"#6A1B9A"},
    {sound:"/θ/ y /ð/",en:"think vs the",tip:"¡Lengua entre los dientes! /θ/ = sin voz (think). /ð/ = con voz (the).",color:"#E65100"},
    {sound:"S + consonante",en:"stop, speak, school",tip:"¡NO pongas 'e' antes! En español: escuela. En inglés: school. Practica: 'ssssstop'.",color:"#880E4F"},
  ];
  const [sel,setSel]=useState(null);
  return(<div>
    <DarkBox title="Sonidos que no existen en español"><div style={{fontSize:13}}>Estos son los que más delatan el acento hispanohablante.</div></DarkBox>
    {desafios.map((c,i)=>(<div key={i} onClick={()=>setSel(sel===i?null:i)} style={{background:"#fff",borderRadius:10,padding:"10px 14px",border:sel===i?"2px solid "+c.color:"1px solid #e0dcd5",marginBottom:6,cursor:"pointer"}}>
      <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{background:c.color,color:"#fff",padding:"2px 10px",borderRadius:6,fontSize:13,fontWeight:800,fontFamily:"monospace"}}>{c.sound}</span><span style={{fontSize:13,color:"#555",fontStyle:"italic"}}>{c.en}</span></div>
      {sel===i&&<div style={{fontSize:12,color:"#666",lineHeight:1.5,marginTop:6,padding:"8px 10px",background:"#FAFAF5",borderRadius:6}}>{c.tip}</div>}
    </div>))}
    <Chatt text="El inglés sureño suaviza consonantes finales: 'didn't' → 'din't'. Normal aquí, pero practica las formas completas para lo formal." />
  </div>);
}

function Guide4(){return(<div>
  <DarkBox title="¿Por qué es tan caótica?"><div style={{fontSize:13,lineHeight:1.6}}>El inglés tomó del latín, francés, alemán, griego — y <strong style={{color:"#EF9A9A"}}>conservó la ortografía original</strong> mientras la pronunciación evolucionaba.</div></DarkBox>
  <SG items={[
    {h:"-ough = ¡7 sonidos diferentes!",b:"through /uː/ · though /oʊ/ · thought /ɔː/\ntough /ʌf/ · cough /ɒf/ · bough /aʊ/ · hiccough /ʌp/"},
    {h:"Patrones que SÍ funcionan",b:"-tion = /ʃən/ (nation, education)\n-ight = /aɪt/ (night, light, fight)\n-ness = /nəs/ (happiness, darkness)"},
    {h:"Letras mudas",b:"K: know, knee, knife · W: write, wrong, wrist\nB: comb, bomb, climb · GH: night, daughter, though"},
    {h:"Misma ortografía, diferente sonido",b:"read (presente) /riːd/ vs read (pasado) /rɛd/\nlead (metal) /lɛd/ vs lead (guiar) /liːd/"},
  ]} />
</div>);}

function Guide5(){
  const pares=[{w1:"REcord",m1:"sustantivo (registro)",w2:"reCORD",m2:"verbo (grabar)"},{w1:"PREsent",m1:"sustantivo (regalo)",w2:"preSENT",m2:"verbo (presentar)"},{w1:"OBject",m1:"sustantivo (objeto)",w2:"obJECT",m2:"verbo (objetar)"},];
  return(<div>
    <DarkBox title="Inglés = ritmo acentual"><div style={{fontSize:13,lineHeight:1.6}}>El español da el mismo tiempo a cada sílaba. El inglés <strong style={{color:"#FFE77A"}}>se apresura en las sin acento</strong> y se demora en las acentuadas.</div></DarkBox>
    <Card color="#E65100" title="El acento cambia el significado">
      {pares.map((p,i)=>(<div key={i} style={{display:"grid",gridTemplateColumns:"1fr 1fr",padding:"8px 16px",borderBottom:i<pares.length-1?"1px solid #f0eeeb":"none"}}><div><span style={{fontWeight:800,color:"#E65100"}}>{p.w1}</span><br/><span style={{fontSize:11,color:"#888"}}>{p.m1}</span></div><div><span style={{fontWeight:800,color:"#1565C0"}}>{p.w2}</span><br/><span style={{fontSize:11,color:"#888"}}>{p.m2}</span></div></div>))}
    </Card>
    <Trampa text="Dar la misma duración a cada sílaba es el error más común. 'Banana' suena como 'buh-NA-nuh' — la primera y última sílaba se reducen a schwa." />
    <Chatt text="El 'Southern drawl' estira vocales: 'well' → 'we-ull', 'can't' → 'cay-unt'. No es habla perezosa — es la música del dialecto local." />
  </div>);
}

// GUÍAS 6-13: VERBOS
function Guide6(){return(<SG items={[
  {h:"Simple Present = hábito / verdad general",b:"I work every day. She speaks English.\n⚠ Añade -s/-es para he/she/it: he works, she goes, it rains"},
  {h:"Present Progressive = ahora mismo",b:"I am working now. She is speaking on the phone."},
  {h:"⚠ El auxiliar DO/DOES (¡no existe en español!)",b:"Preguntas: Do you work? Does she speak English?\nNegación: I don't work. She doesn't speak.\n❌ NUNCA: 'Work you here?' · ✅ SIEMPRE: 'Do you work here?'"},
  {h:"¡No abuses del progresivo!",b:"❌ I am living in Chattanooga. (hecho general)\n✅ I live in Chattanooga.\nVerbos de estado (know, want, like, love) NO usan progresivo."},
]} />);}

function Guide7(){
  const irregs=[{b:"go",p:"went",pp:"gone",es:"ir"},{b:"see",p:"saw",pp:"seen",es:"ver"},{b:"take",p:"took",pp:"taken",es:"tomar"},{b:"give",p:"gave",pp:"given",es:"dar"},{b:"make",p:"made",pp:"made",es:"hacer"},{b:"get",p:"got",pp:"gotten",es:"obtener"},{b:"know",p:"knew",pp:"known",es:"saber"},{b:"think",p:"thought",pp:"thought",es:"pensar"},{b:"say",p:"said",pp:"said",es:"decir"},{b:"eat",p:"ate",pp:"eaten",es:"comer"},{b:"write",p:"wrote",pp:"written",es:"escribir"},{b:"buy",p:"bought",pp:"bought",es:"comprar"},{b:"bring",p:"brought",pp:"brought",es:"traer"},{b:"tell",p:"told",pp:"told",es:"contar"},{b:"find",p:"found",pp:"found",es:"encontrar"},];
  return(<div>
    <SG items={[{h:"El -ed regular: TRES pronunciaciones",b:"/t/ consonante sorda: worked, stopped\n/d/ consonante sonora: played, opened\n/ɪd/ después de t o d: wanted, needed"}]} />
    <Card color="#C62828" title="15 verbos irregulares esenciales" subtitle="Base → Pasado → Participio">
      <div style={{display:"grid",gridTemplateColumns:"60px 1fr 1fr 1fr",padding:"6px 14px",fontSize:9,fontWeight:700,color:"#999",borderBottom:"1px solid #eee"}}><div>Español</div><div>Base</div><div>Pasado</div><div>Participio</div></div>
      {irregs.map((v,i)=>(<div key={i} style={{display:"grid",gridTemplateColumns:"60px 1fr 1fr 1fr",padding:"4px 14px",borderBottom:i<irregs.length-1?"1px solid #f0eeeb":"none",fontSize:12}}><span style={{color:"#888",fontSize:10,fontStyle:"italic"}}>{v.es}</span><span style={{color:"#555"}}>{v.b}</span><span style={{fontWeight:700,color:"#C62828"}}>{v.p}</span><span style={{fontWeight:700,color:"#6A1B9A"}}>{v.pp}</span></div>))}
    </Card>
    <Chatt text="Modales dobles: 'I might could help you' = Tal vez pueda ayudarte. 'Used to could' = Antes podía. Son gramaticalmente sureños, no errores." />
  </div>);
}

function Guide8(){return(<div><SG items={[
  {h:"WILL = espontáneo / predicción / promesa",b:"I'll help you. It will rain. I'll call you back."},
  {h:"GOING TO = planificado / evidencia",b:"I'm going to visit my mom. Look — it's going to rain."},
  {h:"Presente progresivo = agendado",b:"I'm flying to Atlanta on Friday. We're meeting at 3."},
]}/><Chatt text="'Fixin' to' = a punto de. 'I'm fixin' to go to the store.' ES la marca del futuro sureño. La vas a escuchar constantemente en Chattanooga." /></div>);}

function Guide9(){return(<div><DarkBox title="Present Perfect ≠ Pretérito Perfecto"><div style={{fontSize:13}}>En español: "he comido" = pasado reciente. En inglés americano, se usa el <strong style={{color:"#FFE77A"}}>pasado simple</strong>: "I ate" (no "I have eaten").</div></DarkBox><SG items={[

      <div style={{background:"#fff",borderBottom:"1px solid #eee",padding:"10px 16px",display:"flex",alignItems:"center",gap:12,flexShrink:0,zIndex:10}}>
        <button onClick={()=>setMenuOpen(!menuOpen)} style={{width:36,height:36,borderRadius:10,border:"1.5px solid #e0ddd5",background:"#fff",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,color:"#555",flexShrink:0}}>☰</button>
        <div style={{flex:1,minWidth:0}}><div style={{fontSize:14,fontWeight:800,color:"#1a1a1a",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{meta.icon} {meta.title}</div><div style={{fontSize:11,color:"#999"}}>{meta.subtitle}</div></div>
        <div style={{background:meta.color,color:"#fff",padding:"3px 10px",borderRadius:6,fontSize:10,fontWeight:700,flexShrink:0}}>{page+1}/{total}</div>
      </div>
      <div ref={contentRef} style={{flex:1,overflow:"auto",padding:"16px",position:"relative"}}><div key={page} style={{animation:"fadeIn 0.2s ease",maxWidth:700,margin:"0 auto"}}><GuideComp/></div></div>
      <div style={{background:"#fff",borderTop:"1px solid #eee",padding:"8px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <button onClick={prev} disabled={page===0} style={{padding:"8px 20px",borderRadius:10,border:"1.5px solid #e0ddd5",background:page===0?"#f5f5f5":"#fff",color:page===0?"#ccc":"#555",fontSize:13,fontWeight:700,cursor:page===0?"default":"pointer"}}>← Anterior</button>
        <div style={{display:"flex",gap:2}}>{guidesMeta.map((_,i)=>(<div key={i} onClick={()=>goTo(i)} style={{width:i===page?12:3,height:3,borderRadius:2,background:i===page?meta.color:"#ddd",cursor:"pointer",transition:"all 0.2s"}}/>))}</div>
        <button onClick={next} disabled={page===total-1} style={{padding:"8px 20px",borderRadius:10,border:"1.5px solid #e0ddd5",background:page===total-1?"#f5f5f5":"#fff",color:page===total-1?"#ccc":"#555",fontSize:13,fontWeight:700,cursor:page===total-1?"default":"pointer"}}>Siguiente →</button>
      </div>
      {menuOpen&&<div onClick={()=>setMenuOpen(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:20}}/>}
      <div style={{position:"fixed",top:0,left:0,bottom:0,width:280,background:"#fff",zIndex:30,transform:menuOpen?"translateX(0)":"translateX(-100%)",transition:"transform 0.25s ease",boxShadow:menuOpen?"4px 0 24px rgba(0,0,0,0.15)":"none",display:"flex",flexDirection:"column"}}>
        <div style={{padding:"16px 20px",borderBottom:"1px solid #eee",flexShrink:0}}><div style={{fontSize:18,fontWeight:800,color:"#1a1a1a"}}>Inglés Americano</div><div style={{fontSize:12,color:"#999"}}>35 guías para hispanohablantes</div></div>
        <div style={{flex:1,overflow:"auto",padding:"8px 0"}}>
          {categories.map(cat=>{const items=guidesMeta.filter(g=>g.cat===cat);return(<div key={cat}><div style={{padding:"6px 20px",fontSize:10,fontWeight:700,color:catColors[cat],textTransform:"uppercase",letterSpacing:1.5,marginTop:4}}>{cat}</div>
            {items.map(g=>{const idx=g.id-1;const isActive=idx===page;return(<button key={g.id} onClick={()=>goTo(idx)} style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:"8px 20px",border:"none",background:isActive?g.color+"12":"transparent",cursor:"pointer",textAlign:"left",borderLeft:isActive?"3px solid "+g.color:"3px solid transparent"}}><span style={{fontSize:14,width:22,textAlign:"center"}}>{g.icon}</span><div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:isActive?800:600,color:isActive?g.color:"#333",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{g.title}</div><div style={{fontSize:10,color:"#999"}}>{g.subtitle}</div></div><span style={{fontSize:10,color:"#ccc",fontWeight:600}}>{g.id}</span></button>);})}
          </div>);})}
        </div>
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
